<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>AgentCall · 数字分身指挥台</title>
<style>
  /* ========= 设计基座：信号指挥台（地面站/SDR 遥测风） ========= */
  :root {
    --bg0: #04070c;
    --bg1: #0a111b;
    --panel: rgba(13, 21, 33, .78);
    --panel-solid: #0e1622;
    --well: rgba(4, 8, 14, .6);
    --line: rgba(93, 140, 178, .16);
    --line-strong: rgba(93, 160, 200, .32);
    --ink: #d9e6f2;
    --dim: #64788c;
    --dimmer: #42566a;
    --signal: #43e69a;        /* 磷光绿：live/OK/我方 */
    --signal-dim: rgba(67, 230, 154, .14);
    --cyan: #4fc8e8;          /* 青：交互/对方/链接 */
    --cyan-dim: rgba(79, 200, 232, .13);
    --amber: #ffb454;
    --amber-dim: rgba(255, 180, 84, .13);
    --red: #ff5d6c;
    --red-dim: rgba(255, 93, 108, .13);
    --mono: "SF Mono", Menlo, "JetBrains Mono", monospace;
    --disp: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.55 var(--disp);
    color: var(--ink);
    background:
      radial-gradient(1100px 500px at 78% -10%, rgba(38, 90, 118, .22), transparent 60%),
      radial-gradient(900px 600px at -8% 110%, rgba(28, 96, 70, .16), transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg0) 70%);
    background-attachment: fixed;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  /* 雷达坐标网格 + 暗角，铺满全屏的氛围层 */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      repeating-linear-gradient(0deg, rgba(120, 170, 210, .03) 0 1px, transparent 1px 44px),
      repeating-linear-gradient(90deg, rgba(120, 170, 210, .03) 0 1px, transparent 1px 44px);
    mask-image: radial-gradient(120% 100% at 50% 0%, #000 40%, transparent 100%);
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 40;
    background: radial-gradient(140% 120% at 50% 50%, transparent 60%, rgba(0, 0, 0, .42));
  }

  /* ========= 顶部：品牌行 + 作战行 ========= */
  header { position: relative; z-index: 2; }
  .brandbar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 22px 8px;
  }
  .wordmark {
    font-family: var(--mono); font-size: 17px; font-weight: 700; letter-spacing: .14em;
    color: var(--signal);
    text-shadow: 0 0 14px rgba(67, 230, 154, .55), 0 0 44px rgba(67, 230, 154, .22);
  }
  .wordmark .tail { color: var(--dim); font-weight: 400; letter-spacing: .06em; text-shadow: none; }
  .brand-sub { font-size: 12px; color: var(--dim); letter-spacing: .3em; text-transform: uppercase; }
  .brandbar .spacer { flex: 1; }
  .meta { display: flex; gap: 18px; font-size: 12px; color: var(--dim); font-family: var(--mono); }
  .meta b { color: var(--ink); font-weight: 500; }
  .conn { display: inline-flex; align-items: center; gap: 7px; }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    box-shadow: 0 0 10px var(--red);
  }
  .conn-dot.on { background: var(--signal); box-shadow: 0 0 10px var(--signal); }
  .gear {
    background: transparent; border: 1px solid var(--line); color: var(--dim);
    border-radius: 9px; width: 34px; height: 34px; cursor: pointer; font-size: 16px;
    transition: color .15s, border-color .15s, transform .2s;
  }
  .gear:hover { color: var(--cyan); border-color: var(--line-strong); transform: rotate(30deg); }

  /* 作战行：状态核心 + 当前通话 + 拨号/挂断 */
  .opsbar {
    display: flex; align-items: center; gap: 22px;
    margin: 4px 22px 0; padding: 12px 20px;
    background: linear-gradient(90deg, rgba(13, 23, 36, .9), rgba(13, 23, 36, .55));
    border: 1px solid var(--line); border-radius: 14px;
    position: relative; overflow: hidden;
  }
  /* 扫描线：一条沿作战行往复的微光 */
  .opsbar::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 140px; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(79, 200, 232, .06), transparent);
    animation: sweep 7s linear infinite;
  }
  @keyframes sweep { from { left: -140px; } to { left: 100%; } }

  .core { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
  .core .ring, .core .dot { position: absolute; border-radius: 50%; }
  .core .dot {
    inset: 15px; background: var(--dimmer);
    transition: background .3s, box-shadow .3s;
  }
  .core .ring { inset: 0; border: 1px solid var(--line-strong); opacity: .8; }
  .core.idle .dot { background: var(--dimmer); }
  .core.ringing .dot, .core.dialing .dot {
    background: var(--amber); box-shadow: 0 0 18px var(--amber);
    animation: breathe 1s ease-in-out infinite;
  }
  .core.answered .dot {
    background: var(--signal); box-shadow: 0 0 18px var(--signal);
    animation: breathe 1.6s ease-in-out infinite;
  }
  .core.answered .ring { border-color: var(--signal); animation: ripple 1.6s ease-out infinite; }
  .core.ended .dot { background: var(--red); box-shadow: 0 0 12px var(--red); }
  @keyframes breathe { 50% { transform: scale(.82); } }
  @keyframes ripple {
    from { transform: scale(.7); opacity: .9; }
    to   { transform: scale(1.25); opacity: 0; }
  }

  .callinfo { min-width: 240px; }
  .callinfo .lab { font-size: 11px; color: var(--dim); letter-spacing: .18em; }
  .call-number {
    font-family: var(--mono); font-size: 27px; font-weight: 700; letter-spacing: .06em;
    line-height: 1.15; font-variant-numeric: tabular-nums;
  }
  .badge {
    display: inline-block; padding: 2px 11px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: .1em; margin-top: 3px;
    border: 1px solid transparent;
  }
  .badge.idle     { background: var(--well); color: var(--dim); border-color: var(--line); }
  .badge.ringing  { background: var(--amber-dim); color: var(--amber); border-color: rgba(255,180,84,.4); }
  .badge.dialing  { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(79,200,232,.4); }
  .badge.answered { background: var(--signal-dim); color: var(--signal); border-color: rgba(67,230,154,.4); }
  .badge.ended    { background: var(--red-dim); color: var(--red); border-color: rgba(255,93,108,.35); }

  .dialbox { display: flex; gap: 10px; align-items: center; margin-left: auto; }
  .dialbox input {
    width: 240px; background: var(--well); border: 1px solid var(--line);
    color: var(--ink); border-radius: 10px; padding: 10px 14px;
    font-family: var(--mono); font-size: 15px; letter-spacing: .08em;
    transition: border-color .15s, box-shadow .15s;
  }
  .dialbox input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-dim); }
  button.act {
    border: none; border-radius: 10px; padding: 10px 20px;
    font-size: 14px; font-weight: 700; letter-spacing: .06em; cursor: pointer;
    font-family: var(--disp); transition: filter .15s, transform .05s;
  }
  button.act:active { transform: translateY(1px); }
  button.act:disabled { opacity: .45; cursor: default; }
  .btn-dial { background: linear-gradient(180deg, #2ea27a, #1c7a58); color: #eafff5; }
  .btn-dial:hover { filter: brightness(1.15); }
  .btn-hangup { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,93,108,.45); display: none; }
  .btn-hangup.show { display: inline-block; }
  .btn-hangup:hover { background: rgba(255, 93, 108, .24); }
  .btn-keypad { background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(79,200,232,.4); display: none; }
  .btn-keypad.show { display: inline-block; }
  .btn-keypad:hover { background: rgba(79, 200, 232, .22); }
  .ops-toast { font-size: 12px; min-width: 120px; }
  .dialbox .task-input { width: 210px; font-family: var(--disp); font-size: 13px; letter-spacing: normal; }

  /* DTMF 小键盘：header 下方右侧浮出 */
  .keypad {
    display: none; position: absolute; right: 130px; top: 100%; z-index: 30;
    background: var(--panel-solid); border: 1px solid var(--line-strong); border-radius: 12px;
    padding: 12px; box-shadow: 0 18px 44px rgba(0, 0, 0, .55);
  }
  .keypad.show { display: block; }
  .keypad .keys { display: grid; grid-template-columns: repeat(3, 56px); gap: 7px; }
  .keypad .keys button {
    height: 44px; font-family: var(--mono); font-size: 17px; font-weight: 700;
    background: var(--well); border: 1px solid var(--line); color: var(--ink);
    border-radius: 9px; cursor: pointer; transition: background .12s, border-color .12s;
  }
  .keypad .keys button:hover { border-color: var(--cyan); color: var(--cyan); }
  .keypad .keys button:active { background: var(--cyan-dim); }
  .keypad .sent {
    margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--signal);
    min-height: 15px; letter-spacing: .2em; text-align: center;
  }

  /* ========= 三栏主舞台（全视口，面板内滚动） ========= */
  main {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1.35fr 1fr 1.15fr; gap: 14px;
    padding: 14px 22px 18px; height: calc(100vh - 128px);
  }
  .col { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
  .panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 34px rgba(0, 0, 0, .35), inset 0 1px 0 rgba(255, 255, 255, .04);
  }
  .panel.grow { flex: 1; }
  .panel > h2 {
    margin: 0; padding: 11px 16px; font-size: 12px; font-weight: 700;
    letter-spacing: .22em; color: var(--dim); text-transform: uppercase;
    border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px;
  }
  .panel > h2 .tick { color: var(--signal); font-family: var(--mono); }
  .panel .body { padding: 13px 16px; overflow-y: auto; flex: 1; min-height: 0; }
  .body::-webkit-scrollbar { width: 8px; }
  .body::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  .empty { color: var(--dimmer); font-size: 13px; text-align: center; margin-top: 34px; letter-spacing: .05em; }

  /* ========= 实时对话 ========= */
  #chat { display: flex; flex-direction: column; }
  .bubble { margin-bottom: 13px; max-width: 86%; animation: rise .25s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
  .bubble .who { font-size: 10px; letter-spacing: .16em; color: var(--dim); margin-bottom: 4px; }
  .bubble .text {
    padding: 9px 13px; border-radius: 12px; font-size: 14px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word; border: 1px solid transparent;
  }
  .bubble.agent .text {
    background: var(--signal-dim); border-color: rgba(67, 230, 154, .22);
    border-bottom-left-radius: 3px;
  }
  .bubble.user { margin-left: auto; text-align: right; }
  .bubble.user .text {
    background: var(--cyan-dim); border-color: rgba(79, 200, 232, .22);
    border-bottom-right-radius: 3px; display: inline-block; text-align: left;
  }
  .bubble .time { font-size: 10px; color: var(--dimmer); margin-top: 3px; font-family: var(--mono); }

  /* ========= 表单公共 ========= */
  .formzone { border-top: 1px solid var(--line); padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .formzone input[type=text], .formzone textarea {
    background: var(--well); border: 1px solid var(--line); color: var(--ink);
    border-radius: 9px; padding: 9px 12px; font-size: 14px; font-family: var(--disp);
    resize: vertical; transition: border-color .15s, box-shadow .15s;
  }
  .formzone input:focus, .formzone textarea:focus {
    outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-dim);
  }
  .formzone textarea { min-height: 54px; font-family: var(--mono); font-size: 13px; }
  .formzone .btn-line { display: flex; gap: 10px; align-items: center; }
  .btn-send {
    background: linear-gradient(180deg, #2792b8, #196a8c); color: #eafaff;
    border: none; border-radius: 9px; padding: 9px 18px;
    font-size: 13px; font-weight: 700; letter-spacing: .05em; cursor: pointer;
    transition: filter .15s;
  }
  .btn-send:hover { filter: brightness(1.15); }
  .btn-send:disabled { opacity: .45; cursor: default; }
  .toast { font-size: 12px; min-height: 15px; color: var(--dim); }
  .toast.ok { color: var(--signal); }
  .toast.err { color: var(--red); }

  /* ========= 短信 ========= */
  .sms-item {
    padding: 9px 12px; border-radius: 10px; margin-bottom: 9px;
    background: var(--well); border: 1px solid var(--line);
    border-left: 3px solid var(--dimmer);
  }
  .sms-item.in  { border-left-color: var(--cyan); }
  .sms-item.out { border-left-color: var(--signal); }
  .sms-item .head {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 11px; color: var(--dim); margin-bottom: 4px; font-family: var(--mono);
  }
  .sms-item.in  .dir { color: var(--cyan); font-weight: 700; }
  .sms-item.out .dir { color: var(--signal); font-weight: 700; }
  .sms-item .content { font-size: 13.5px; white-space: pre-wrap; word-break: break-word; }
  .sms-item .st.failed, .sms-item .st.error { color: var(--red); }

  /* ========= 批量外呼 ========= */
  .q-stat { font-size: 12px; color: var(--dim); margin-bottom: 8px; letter-spacing: .04em; }
  .q-num {
    display: inline-block; background: var(--well); border: 1px solid var(--line);
    border-radius: 7px; padding: 2px 9px; margin: 2px 5px 2px 0;
    font-size: 12px; font-family: var(--mono); font-variant-numeric: tabular-nums;
  }
  .q-num.cur  { border-color: var(--cyan); color: var(--cyan); animation: breathe 1.4s ease-in-out infinite; }
  .q-num.ok   { color: var(--signal); }
  .q-num.fail { color: var(--red); }

  /* ========= 通话历史 ========= */
  .hist-item {
    padding: 10px 12px; border-radius: 10px; margin-bottom: 9px;
    background: var(--well); border: 1px solid var(--line); cursor: pointer;
    transition: border-color .15s, transform .12s;
  }
  .hist-item:hover { border-color: var(--line-strong); transform: translateY(-1px); }
  .hist-item.open { border-color: var(--line-strong); }
  .hist-item .head {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 11px; color: var(--dim); font-family: var(--mono);
  }
  .hist-item .num { font-size: 15px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .hist-item .dir.in  { color: var(--cyan); }
  .hist-item .dir.out { color: var(--signal); }
  .hist-item .st.completed { color: var(--signal); }
  .hist-item .st.failed, .hist-item .st.not_connected { color: var(--red); }
  .hist-item .sum {
    font-size: 12px; color: var(--dim); margin-top: 6px;
    white-space: pre-wrap; word-break: break-word; line-height: 1.5;
    border-left: 2px solid var(--line-strong); padding-left: 8px;
  }
  .timeline { display: none; margin-top: 9px; border-top: 1px dashed var(--line); padding-top: 7px; }
  .hist-item.open .timeline { display: block; }
  .tl-row { display: flex; gap: 9px; font-size: 11px; color: var(--dim); padding: 2px 0; font-family: var(--mono); }
  .tl-row .t  { color: var(--cyan); min-width: 62px; flex-shrink: 0; }
  .tl-row .ty { color: var(--ink); min-width: 86px; flex-shrink: 0; font-family: var(--disp); }
  .tl-row .detail { white-space: pre-wrap; word-break: break-word; }

  /* ========= 设置抽屉 ========= */
  .drawer-mask {
    position: fixed; inset: 0; background: rgba(2, 5, 9, .55); z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity .22s;
  }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 480px; z-index: 51;
    background: var(--panel-solid); border-left: 1px solid var(--line-strong);
    transform: translateX(102%); transition: transform .26s cubic-bezier(.3, .9, .3, 1);
    display: flex; flex-direction: column;
    box-shadow: -24px 0 60px rgba(0, 0, 0, .5);
  }
  body.drawer-open .drawer { transform: none; }
  body.drawer-open .drawer-mask { opacity: 1; pointer-events: auto; }
  .drawer h2 {
    margin: 0; padding: 15px 20px; font-size: 13px; letter-spacing: .22em;
    color: var(--dim); border-bottom: 1px solid var(--line); text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .drawer h2 button {
    background: none; border: none; color: var(--dim); font-size: 18px; cursor: pointer;
  }
  .drawer .body { padding: 6px 20px 16px; overflow-y: auto; flex: 1; }
  .cfg-group { margin-top: 14px; }
  .cfg-group > .gname {
    font-size: 11px; color: var(--cyan); letter-spacing: .2em; font-weight: 700;
    padding-bottom: 4px; border-bottom: 1px solid var(--line);
  }
  .cfg-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 9px 0; border-bottom: 1px solid rgba(93, 140, 178, .08);
  }
  .cfg-row label { font-size: 13px; flex: 1; }
  .cfg-row .key { display: block; font-size: 10px; color: var(--dimmer); font-family: var(--mono); }
  .tag-restart { font-size: 10px; color: var(--amber); margin-left: 6px; }
  .cfg-row input[type=text], .cfg-row select {
    width: 180px; background: var(--well); border: 1px solid var(--line);
    color: var(--ink); border-radius: 7px; padding: 6px 9px; font-size: 13px; font-family: var(--mono);
  }
  .cfg-row input:disabled, .cfg-row select:disabled { opacity: .4; }
  .tag-secret {
    font-size: 11px; padding: 2px 11px; border-radius: 999px;
    background: var(--well); border: 1px solid var(--line); color: var(--dim);
  }
  .tag-secret.set { color: var(--signal); border-color: rgba(67, 230, 154, .35); }
  /* 开关 */
  .switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .knob {
    position: absolute; inset: 0; border-radius: 999px; cursor: pointer;
    background: var(--well); border: 1px solid var(--line); transition: background .18s, border-color .18s;
  }
  .switch .knob::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
    border-radius: 50%; background: var(--dim); transition: transform .18s cubic-bezier(.3, 1.3, .6, 1), background .18s;
  }
  .switch input:checked + .knob { background: rgba(67, 230, 154, .25); border-color: rgba(67, 230, 154, .5); }
  .switch input:checked + .knob::after { transform: translateX(18px); background: var(--signal); }
  .switch input:disabled + .knob { opacity: .4; cursor: default; }
  .drawer .formzone { padding: 12px 20px; }
</style>
</head>
<body>
  <header>
    <div class="brandbar">
      <span class="wordmark">AGENTCALL<span class="tail"> // OPS</span></span>
      <span class="brand-sub">数字分身指挥台</span>
      <span class="spacer"></span>
      <div class="meta">
        <span class="conn"><span id="dot" class="conn-dot"></span><span id="conn">连接中…</span></span>
        <span>MODEL <b id="model">-</b></span>
        <span>PORT <b id="port">-</b></span>
        <span>PROVIDER <b id="provider">-</b></span>
      </div>
      <button class="gear" id="gearBtn" title="设置">⚙</button>
    </div>
    <div class="opsbar">
      <div class="core idle" id="core"><span class="ring"></span><span class="dot"></span></div>
      <div class="callinfo">
        <div class="lab">当前线路</div>
        <div class="call-number" id="callNumber">—</div>
        <span class="badge idle" id="callBadge">空闲</span>
      </div>
      <div class="dialbox">
        <span class="ops-toast toast" id="dialToast"></span>
        <input id="dialNumber" type="text" placeholder="拨打号码，如 10000" />
        <input id="dialTask" type="text" class="task-input" placeholder="外呼主题（空=沿用上次）" title="本通电话的目的；留空则沿用上次主题" />
        <button class="act btn-dial" id="dialBtn">拨打</button>
        <button class="act btn-keypad" id="keypadBtn" title="发送按键（IVR）">⌗ 按键</button>
        <button class="act btn-hangup" id="hangupBtn">挂断</button>
      </div>
    </div>
    <div class="keypad" id="keypad">
      <div class="keys"></div>
      <div class="sent" id="dtmfSent"></div>
    </div>
  </header>

  <main>
    <div class="col">
      <section class="panel grow">
        <h2><span class="tick">▮▯</span>实时对话</h2>
        <div class="body" id="chat">
          <div class="empty" id="chatEmpty">待机中 — 通话开始后此处实时转写</div>
        </div>
      </section>
    </div>

    <div class="col">
      <section class="panel grow">
        <h2><span class="tick">✉</span>短信</h2>
        <div class="body" id="smsList">
          <div class="empty" id="smsEmpty">暂无短信</div>
        </div>
        <div class="formzone">
          <input id="smsNumber" type="text" placeholder="对方号码" />
          <textarea id="smsText" placeholder="短信内容（支持中文）"></textarea>
          <div class="btn-line">
            <button class="btn-send" id="smsSend">发送短信</button>
            <span class="toast" id="smsToast"></span>
          </div>
        </div>
      </section>
      <section class="panel" style="flex:0 0 auto; max-height: 42%;">
        <h2><span class="tick">⇶</span>批量外呼</h2>
        <div class="body" id="queueStatus"><div class="q-stat">队列空闲</div></div>
        <div class="formzone">
          <textarea id="batchNumbers" placeholder="每行一个号码，可批量粘贴"></textarea>
          <input id="batchTask" type="text" placeholder="本批次外呼任务说明（可选）" />
          <div class="btn-line">
            <button class="btn-send" id="batchDialBtn">加入队列</button>
            <span class="toast" id="batchToast"></span>
          </div>
        </div>
      </section>
    </div>

    <div class="col">
      <section class="panel grow">
        <h2><span class="tick">◷</span>通话历史</h2>
        <div class="body" id="historyList"><div class="empty">暂无通话记录</div></div>
      </section>
    </div>
  </main>

  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer">
    <h2>系统设置 <button id="drawerClose" title="关闭">✕</button></h2>
    <div class="body" id="configForm"><div class="empty">正在加载配置…</div></div>
    <div class="formzone">
      <div class="btn-line">
        <button class="btn-send" id="configSave">保存设置</button>
        <span class="toast" id="configToast"></span>
      </div>
    </div>
  </aside>

<script>
const $ = (id) => document.getElementById(id);
const badgeText = { ringing: "振铃中", dialing: "拨号中", answered: "通话中", ended: "已结束", idle: "空闲" };

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;   // 全量 textContent，杜绝注入
  return n;
}

function fmtTime(ts) {
  const d = ts ? new Date(ts * 1000) : new Date();
  return d.toLocaleTimeString("zh-CN", { hour12: false });
}

/* ---- 作战行：通话状态 ---- */
let callActive = false;
function setCall(status, caller) {
  $("callNumber").textContent = status === "idle" ? "—" : (caller || "未知号码");
  const badge = $("callBadge");
  badge.className = "badge " + status;
  badge.textContent = badgeText[status] || status;
  $("core").className = "core " + status;
  callActive = (status === "ringing" || status === "dialing" || status === "answered");
  $("hangupBtn").classList.toggle("show", callActive);
  $("keypadBtn").classList.toggle("show", callActive);
  if (!callActive) { $("keypad").classList.remove("show"); $("dtmfSent").textContent = ""; }
}

/* ---- 实时对话 ---- */
function addTranscript(role, text, ts) {
  $("chatEmpty")?.remove();
  const chat = $("chat");
  const b = el("div", "bubble " + (role === "user" ? "user" : "agent"));
  b.appendChild(el("div", "who", role === "user" ? "对方" : "数字分身"));
  b.appendChild(el("div", "text", text));
  b.appendChild(el("div", "time", fmtTime(ts)));
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
}

/* ---- 短信 ---- */
function addSms(event) {
  $("smsEmpty")?.remove();
  const isIn = event.type === "sms_in";
  const item = el("div", "sms-item " + (isIn ? "in" : "out"));
  const head = el("div", "head");
  const who = isIn ? (event.sender || "未知") : (event.number || "");
  head.appendChild(el("span", "dir", (isIn ? "收 ← " : "发 → ") + who));
  const right = el("span");
  right.appendChild(el("span", "", fmtTime(event.ts) + " "));
  if (event.status) right.appendChild(el("span", "st " + event.status, event.status));
  head.appendChild(right);
  item.appendChild(head);
  item.appendChild(el("div", "content", event.text || ""));
  $("smsList").insertBefore(item, $("smsList").firstChild);
}

/* ---- WebSocket ---- */
function handleEvent(ev) {
  if (ev.type === "call") {
    setCall(ev.status, ev.caller);
    if (ev.status === "ended") setTimeout(loadHistory, 1200);
  } else if (ev.type === "transcript") {
    addTranscript(ev.role, ev.text, ev.ts);
  } else if (ev.type === "sms_in" || ev.type === "sms_out") {
    addSms(ev);
  } else if (ev.type === "call_summary") {
    loadHistory();
  }
}

let ws;
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => { $("dot").classList.add("on"); $("conn").textContent = "LINK"; };
  ws.onclose = () => {
    $("dot").classList.remove("on"); $("conn").textContent = "RETRY…";
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch (err) {} };
}

async function loadMeta() {
  try {
    const m = await (await fetch("/api/meta")).json();
    $("model").textContent = m.model || "-";
    $("port").textContent = m.port || "-";
    $("provider").textContent = m.provider || "-";
  } catch (e) {}
}

/* ---- 表单提交公共 ---- */
async function postJson(url, body) {
  const r = await fetch(url, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return { httpOk: r.ok, res: await r.json() };
}
function setToast(id, cls, text) {
  const t = $(id); t.className = t.classList.contains("ops-toast") ? "ops-toast toast " + cls : "toast " + cls;
  t.textContent = text;
}

/* ---- 拨打 / 挂断 ---- */
async function doDial() {
  const number = $("dialNumber").value.trim();
  if (!number) { setToast("dialToast", "err", "请填写号码"); return; }
  const task = $("dialTask").value.trim();
  const btn = $("dialBtn");
  btn.disabled = true; setToast("dialToast", "", "呼叫中…");
  try {
    const { res } = await postJson("/api/call/dial", { number, task: task || null });
    if (res.ok) {
      setToast("dialToast", "ok", "已发起");
      if (task) { updateTaskPlaceholder(task); $("dialTask").value = ""; }
    }
    else setToast("dialToast", "err", res.error || "呼叫失败");
  } catch (err) { setToast("dialToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
}
/* 主题输入的 placeholder 显示当前默认（上次主题），一眼可见"不填会用什么" */
function updateTaskPlaceholder(task) {
  const t = (task || "").trim();
  if (t) $("dialTask").placeholder = "主题（空=沿用）：" + (t.length > 18 ? t.slice(0, 18) + "…" : t);
}
async function loadDefaultTask() {
  try {
    const specs = await (await fetch("/api/config")).json();
    const spec = specs.find((c) => c.key === "AGENT_OUTBOUND_TASK");
    if (spec) updateTaskPlaceholder(spec.value);
  } catch (e) {}
}

/* ---- DTMF 小键盘 ---- */
(function initKeypad() {
  const keys = document.querySelector("#keypad .keys");
  for (const k of ["1","2","3","4","5","6","7","8","9","*","0","#"]) {
    const b = el("button", "", k);
    b.addEventListener("click", async () => {
      try {
        const { res } = await postJson("/api/call/dtmf", { digits: k });
        if (res.ok) $("dtmfSent").textContent = ($("dtmfSent").textContent + k).slice(-16);
        else $("dtmfSent").textContent = "发送失败";
      } catch (e) { $("dtmfSent").textContent = "请求出错"; }
    });
    keys.appendChild(b);
  }
})();
$("keypadBtn").addEventListener("click", () => $("keypad").classList.toggle("show"));
$("dialBtn").addEventListener("click", doDial);
$("dialNumber").addEventListener("keydown", (e) => { if (e.key === "Enter") doDial(); });

$("hangupBtn").addEventListener("click", async () => {
  const btn = $("hangupBtn");
  btn.disabled = true; setToast("dialToast", "", "挂断中…");
  try {
    const { res } = await postJson("/api/call/hangup", {});
    if (res.ok) setToast("dialToast", "ok", "已挂断");
    else setToast("dialToast", "err", res.error || "挂断失败");
  } catch (err) { setToast("dialToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

/* ---- 发短信 ---- */
$("smsSend").addEventListener("click", async () => {
  const number = $("smsNumber").value.trim();
  const text = $("smsText").value;
  if (!number || !text.trim()) { setToast("smsToast", "err", "请填写号码和内容"); return; }
  const btn = $("smsSend");
  btn.disabled = true; setToast("smsToast", "", "发送中…");
  try {
    const { res } = await postJson("/api/sms/send", { number, text });
    if (res.ok) { setToast("smsToast", "ok", "已发送"); $("smsText").value = ""; }
    else setToast("smsToast", "err", "发送失败：" + (res.error || "未知错误"));
  } catch (err) { setToast("smsToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

/* ---- 通话历史 ---- */
const dirText = { inbound: "呼入", outbound: "呼出" };
const statusText = { completed: "已完成", failed: "异常", not_connected: "未接通" };
const openCalls = new Set();

function fmtDateTime(ts) {
  if (!ts) return "-";
  return new Date(ts * 1000).toLocaleString("zh-CN", {
    hour12: false, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit",
  });
}

function evTypeText(ev) {
  const m = {
    call_started: "通话开始", dialing: "拨号", connected: "接通", answered: "已接听",
    bridge_started: "音频桥就绪", agent_started: "Agent 就绪", greeting_sent: "开场白",
    latency: "延迟打点", summary: "生成摘要", ended: "会话收尾",
    call_finished: "通话结束", not_connected: "未接通",
  };
  if (ev.type === "transcript") return ev.role === "user" ? "对方说" : "分身说";
  return m[ev.type] || ev.type;
}

function evDetail(ev) {
  if (ev.type === "transcript") return ev.text || "";
  if (ev.type === "latency") return `${ev.stage || ""} ${Math.round(ev.ms || 0)}ms`;
  if (ev.type === "call_finished") return statusText[ev.status] || ev.status || "";
  if (ev.type === "dialing") return ev.number || "";
  return "";
}

async function loadTimeline(tl, id) {
  try {
    const r = await fetch(`/api/history/${encodeURIComponent(id)}/events`);
    if (!r.ok) return;
    const events = await r.json();
    tl.textContent = "";
    for (const ev of events) {
      const row = el("div", "tl-row");
      row.appendChild(el("span", "t", ev.ts ? fmtTime(ev.ts) : ""));
      row.appendChild(el("span", "ty", evTypeText(ev)));
      row.appendChild(el("span", "detail", evDetail(ev)));
      tl.appendChild(row);
    }
    tl.dataset.loaded = "1";
  } catch (e) {}
}

async function toggleHistItem(item, id) {
  if (item.classList.contains("open")) {
    item.classList.remove("open"); openCalls.delete(id); return;
  }
  const tl = item.querySelector(".timeline");
  if (!tl.dataset.loaded) await loadTimeline(tl, id);
  item.classList.add("open"); openCalls.add(id);
}

async function loadHistory() {
  try {
    const r = await fetch("/api/history?limit=50");
    if (!r.ok) return;
    const calls = await r.json();
    const list = $("historyList");
    list.textContent = "";
    if (!calls.length) { list.appendChild(el("div", "empty", "暂无通话记录")); return; }
    for (const c of calls) {
      const item = el("div", "hist-item");
      const head1 = el("div", "head");
      head1.appendChild(el("span", "num", c.number || "未知号码"));
      const right = el("span");
      right.appendChild(el("span", "dir " + (c.direction === "inbound" ? "in" : "out"),
        dirText[c.direction] || c.direction || "?"));
      right.appendChild(document.createTextNode(" "));
      right.appendChild(el("span", "st " + (c.status || ""), statusText[c.status] || c.status || ""));
      head1.appendChild(right);
      item.appendChild(head1);
      const head2 = el("div", "head");
      head2.appendChild(el("span", "", fmtDateTime(c.started_at)));
      item.appendChild(head2);
      const summaryText = c.summary && c.summary.summary ? c.summary.summary : "";
      if (summaryText) item.appendChild(el("div", "sum", summaryText));
      item.appendChild(el("div", "timeline"));
      item.addEventListener("click", () => toggleHistItem(item, c.id));
      list.appendChild(item);
      if (openCalls.has(c.id)) {
        loadTimeline(item.querySelector(".timeline"), c.id);
        item.classList.add("open");
      }
    }
  } catch (e) {}
}

/* ---- 批量外呼 ---- */
function queueChip(parent, text, cls) {
  parent.appendChild(el("span", "q-num" + (cls ? " " + cls : ""), text));
}

async function refreshQueue() {
  try {
    const r = await fetch("/api/call/queue");
    if (!r.ok) return;
    const q = await r.json();
    const box = $("queueStatus");
    box.textContent = "";
    const statText = q.active
      ? `队列进行中 · 待拨 ${q.pending.length} · 已拨 ${(q.done || []).length}`
      : ((q.done || []).length ? `队列空闲 · 本轮已拨 ${q.done.length}` : "队列空闲");
    box.appendChild(el("div", "q-stat", statText));
    if (q.current) queueChip(box, `${q.current} ◉拨打中`, "cur");
    for (const n of q.pending) queueChip(box, n);
    for (const d of (q.done || []).slice(-12)) {
      queueChip(box, `${d.number} ${d.ok ? "✓" : "✗" + (d.error ? " " + d.error : "")}`, d.ok ? "ok" : "fail");
    }
  } catch (e) {}
}

$("batchDialBtn").addEventListener("click", async () => {
  const numbers = $("batchNumbers").value
    .split(/[\r\n,，;；]+/).map((s) => s.trim()).filter(Boolean);
  const task = $("batchTask").value.trim();
  if (!numbers.length) { setToast("batchToast", "err", "请填写至少一个号码"); return; }
  const btn = $("batchDialBtn");
  btn.disabled = true; setToast("batchToast", "", "入队中…");
  try {
    const { httpOk, res } = await postJson("/api/call/batch_dial", { numbers, task: task || null });
    if (httpOk) {
      let msg = `已入队 ${res.accepted.length} 个`;
      if (res.rejected.length) msg += `，拒绝 ${res.rejected.length} 个（${res.rejected.join("、")}）`;
      setToast("batchToast", res.accepted.length ? "ok" : "err", msg);
      if (res.accepted.length) $("batchNumbers").value = "";
      refreshQueue();
    } else setToast("batchToast", "err", "入队失败：" + (res.error || "未知错误"));
  } catch (err) { setToast("batchToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

/* ---- 设置抽屉 ---- */
$("gearBtn").addEventListener("click", () => document.body.classList.add("drawer-open"));
$("drawerClose").addEventListener("click", () => document.body.classList.remove("drawer-open"));
$("drawerMask").addEventListener("click", () => document.body.classList.remove("drawer-open"));

let cfgSpecs = [];
const truthy = ["true", "1", "yes"];
const boolChecked = (v) => truthy.includes(String(v).trim().toLowerCase());

/* 配置按 key 前缀分组，信息架构更清晰 */
function cfgGroup(key) {
  if (/^(AGENT_PROVIDER|QWEN_|AGENT_MODEL|AGENT_OUTBOUND|DASHSCOPE)/.test(key)) return "AI 与人设";
  if (/^MODEM_/.test(key)) return "模组与音频";
  if (/^(RECORDING_|SUMMARY_|CALL_LOG)/.test(key)) return "记录与摘要";
  if (/^MONITOR_/.test(key)) return "本机监听";
  if (/^(DIAL_|SMS_)/.test(key)) return "外呼与短信";
  return "系统";
}

async function loadConfig() {
  try {
    const r = await fetch("/api/config");
    if (!r.ok) return;
    cfgSpecs = await r.json();
    const form = $("configForm");
    form.textContent = "";
    const groups = new Map();
    for (const c of cfgSpecs) {
      const g = cfgGroup(c.key);
      if (!groups.has(g)) {
        const wrap = el("div", "cfg-group");
        wrap.appendChild(el("div", "gname", g));
        groups.set(g, wrap);
        form.appendChild(wrap);
      }
      const row = el("div", "cfg-row");
      const label = el("label", "", c.label);
      if (c.requires_restart) label.appendChild(el("span", "tag-restart", "改后需重启"));
      label.appendChild(el("span", "key", c.key));
      row.appendChild(label);

      let ctrl;
      if (c.secret) {
        ctrl = el("span", "tag-secret" + (c.value === "已设置" ? " set" : ""), c.value);
      } else if (c.kind === "bool") {
        const sw = el("label", "switch");
        ctrl = document.createElement("input");
        ctrl.type = "checkbox";
        ctrl.checked = boolChecked(c.value);
        sw.appendChild(ctrl);
        sw.appendChild(el("span", "knob"));
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        row.appendChild(sw);
        groups.get(g).appendChild(row);
        continue;
      } else if (c.kind === "select") {
        ctrl = document.createElement("select");
        for (const ch of c.choices) {
          const opt = document.createElement("option");
          opt.value = ch; opt.textContent = ch;
          ctrl.appendChild(opt);
        }
        ctrl.value = c.value;
      } else {
        ctrl = document.createElement("input");
        ctrl.type = "text";
        ctrl.value = c.value;
      }
      if (!c.secret) { ctrl.disabled = !c.editable; ctrl.dataset.key = c.key; }
      row.appendChild(ctrl);
      groups.get(g).appendChild(row);
    }
  } catch (e) {}
}

$("configSave").addEventListener("click", async () => {
  const updates = {};
  for (const c of cfgSpecs) {
    if (!c.editable || c.secret) continue;
    const ctrl = document.querySelector(`#configForm [data-key="${c.key}"]`);
    if (!ctrl) continue;
    const val = c.kind === "bool" ? (ctrl.checked ? "true" : "false") : ctrl.value;
    const orig = c.kind === "bool" ? (boolChecked(c.value) ? "true" : "false") : String(c.value);
    if (val !== orig) updates[c.key] = val;
  }
  if (!Object.keys(updates).length) { setToast("configToast", "", "没有需要保存的修改"); return; }
  const btn = $("configSave");
  btn.disabled = true; setToast("configToast", "", "保存中…");
  try {
    const { httpOk, res } = await postJson("/api/config", updates);
    if (httpOk) {
      let msg = `已保存 ${res.updated.length} 项`;
      if (res.requires_restart.length) msg += `，其中 ${res.requires_restart.length} 项需重启生效`;
      setToast("configToast", "ok", msg);
      loadConfig();
    } else setToast("configToast", "err", "保存失败：" + (res.error || "未知错误"));
  } catch (err) { setToast("configToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

loadMeta();
connect();
loadHistory();
refreshQueue();
loadConfig();
loadDefaultTask();
setInterval(refreshQueue, 2000);
</script>
</body>
</html>
