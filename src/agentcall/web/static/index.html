<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>AgentCall · 数字分身</title>
<style>
  /* ========= 设计基座：iOS 深色玻璃态（借鉴 Agent for Call.app）========= */
  :root {
    --bg: #0a0e16;
    --surface: rgba(24, 30, 42, .55);
    --surface-strong: rgba(32, 39, 54, .6);
    --well: rgba(10, 14, 22, .5);
    --border: rgba(255, 255, 255, .08);
    --border-strong: rgba(255, 255, 255, .15);
    --text: #ebeff5;
    --muted: #97a1b0;
    --dim: #5d6878;
    --blue: #0a84ff;
    --blue-dim: rgba(10, 132, 255, .12);
    --ok: #30d158;
    --ok-dim: rgba(48, 209, 88, .12);
    --warn: #ffd60a;
    --warn-dim: rgba(255, 214, 10, .12);
    --err: #ff453a;
    --err-dim: rgba(255, 69, 58, .12);
    --mono: "SF Mono", Menlo, monospace;
    --grad-blue: linear-gradient(180deg, #1789f0, #0071d6 55%, #005bb8);
    --grad-green: linear-gradient(160deg, #34c759, #1e9e43);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.55 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background:
      radial-gradient(900px 480px at 82% -8%, rgba(10, 132, 255, .13), transparent 60%),
      radial-gradient(760px 520px at -6% 108%, rgba(48, 209, 88, .07), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ========= 顶部全局状态条 ========= */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(14, 19, 29, .72);
    backdrop-filter: blur(18px) saturate(1.4);
    position: relative; z-index: 20;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(180deg, #2f97ff, #7b3ff2);
    display: grid; place-items: center; font-size: 16px;
    filter: drop-shadow(0 2px 8px rgba(47, 111, 235, .45));
  }
  .titlebox b { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
  .titlebox span { display: block; font-size: 11px; color: var(--muted); }
  /* 全局状态 chip：随通话状态换色 + 呼吸 */
  .state-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 999px; margin-left: 10px;
    background: var(--well); border: 1px solid var(--border);
    font-size: 12.5px; font-weight: 600;
  }
  .state-chip .sdot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--dim);
  }
  .state-chip.idle .sdot { background: var(--dim); }
  .state-chip.ringing, .state-chip.dialing { border-color: rgba(255, 214, 10, .4); color: var(--warn); }
  .state-chip.ringing .sdot, .state-chip.dialing .sdot {
    background: var(--warn); box-shadow: 0 0 10px var(--warn);
    animation: breathe 1s ease-in-out infinite;
  }
  .state-chip.answered { border-color: rgba(48, 209, 88, .45); color: var(--ok); }
  .state-chip.answered .sdot {
    background: var(--ok); box-shadow: 0 0 10px var(--ok);
    animation: breathe 1.5s ease-in-out infinite;
  }
  .state-chip.ended { border-color: rgba(255, 69, 58, .4); color: var(--err); }
  .state-chip.ended .sdot { background: var(--err); }
  .state-chip .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  @keyframes breathe { 50% { transform: scale(.7); opacity: .7; } }

  header .spacer { flex: 1; }
  /* 通话中快捷操作（任意面板可见） */
  .quick-acts { display: none; gap: 8px; }
  .quick-acts.show { display: flex; }
  .meta { display: flex; gap: 14px; font-size: 11.5px; color: var(--muted); font-family: var(--mono); }
  .meta b { color: var(--text); font-weight: 500; }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    background: var(--err); box-shadow: 0 0 8px var(--err); margin-right: 5px;
  }
  .conn-dot.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

  /* ========= 按钮体系（poc 语言：渐变 primary + 透明 danger）========= */
  button { font-family: inherit; }
  .btn {
    border: none; border-radius: 11px; padding: 10px 18px;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .02em;
    transition: filter .15s, transform .06s, box-shadow .2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.primary {
    background: var(--grad-blue); color: #fff;
    box-shadow: 0 2px 14px rgba(10, 132, 255, .35), inset 0 1px 0 rgba(255, 255, 255, .22);
  }
  .btn.primary:hover { filter: brightness(1.12); box-shadow: 0 2px 20px rgba(10, 132, 255, .55); }
  .btn.danger {
    background: var(--err-dim); color: var(--err); border: 1px solid rgba(255, 69, 58, .4);
  }
  .btn.danger:hover { background: rgba(255, 69, 58, .22); }
  .btn.ghost {
    background: var(--well); color: var(--text); border: 1px solid var(--border);
  }
  .btn.ghost:hover { border-color: var(--border-strong); }
  .btn.sm { padding: 7px 14px; font-size: 13px; border-radius: 9px; }

  /* ========= 主区：分面板 ========= */
  main {
    height: calc(100vh - 57px);
    overflow: hidden; position: relative; z-index: 1;
  }
  .panel-page {
    display: none; height: 100%; overflow-y: auto;
    padding: 20px 24px 110px;  /* 底部给 dock 留空间（poc 教训） */
  }
  .panel-page.active { display: block; animation: fadein .22s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } }
  .panel-page::-webkit-scrollbar { width: 9px; }
  .panel-page::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

  /* 玻璃卡片（poc 核心质感） */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    backdrop-filter: blur(18px) saturate(1.4);
    box-shadow: 0 8px 28px rgba(0, 0, 0, .35), inset 0 1px 0 rgba(255, 255, 255, .06);
    overflow: hidden;
  }
  .card > h2 {
    margin: 0; padding: 14px 20px; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 9px;
    border-bottom: 1px solid var(--border);
  }
  .card > h2 .sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: auto; }
  .card .inner { padding: 16px 20px; }

  /* ========= 电话面板：双卡布局（poc home-card）========= */
  #page-phone .wrap { max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .home-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: 0; }
  .home-grid .dial-col { padding: 22px 26px; border-right: 1px solid var(--border); }
  .home-grid .recent-col { padding: 22px 24px; }
  .col-label { font-size: 11px; letter-spacing: .18em; color: var(--muted); margin-bottom: 12px; font-weight: 700; }

  .dial-input {
    width: 100%; text-align: center;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 14px; padding: 14px;
    font-family: var(--mono); font-size: 26px; font-weight: 700; letter-spacing: .1em;
    font-variant-numeric: tabular-nums;
    transition: border-color .15s, box-shadow .15s;
  }
  .dial-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-dim); }
  .task-input {
    width: 100%; margin-top: 10px;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 11px 14px; font-size: 14px;
  }
  .task-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .dial-actions { display: flex; gap: 10px; margin-top: 14px; }
  .dial-actions .btn { flex: 1; padding: 14px; font-size: 16px; }
  .toast { font-size: 12px; min-height: 16px; color: var(--muted); margin-top: 8px; }
  .toast.ok { color: var(--ok); }
  .toast.err { color: var(--err); }

  /* 批量外呼（拨号列内折叠区） */
  .batch-zone { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 16px; }
  .batch-zone textarea {
    width: 100%; min-height: 62px; resize: vertical;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 10px 12px; font-family: var(--mono); font-size: 13px;
  }
  .batch-zone textarea:focus, .batch-zone input:focus { outline: none; border-color: var(--blue); }
  .batch-zone input {
    width: 100%; margin-top: 8px;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 9px 12px; font-size: 13.5px;
  }
  .batch-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .q-chips { margin-top: 10px; }
  .q-stat { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .q-num {
    display: inline-block; background: var(--well); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px 10px; margin: 2px 5px 2px 0;
    font-size: 12px; font-family: var(--mono);
  }
  .q-num.cur { border-color: var(--blue); color: var(--blue); animation: breathe 1.4s infinite; }
  .q-num.ok { color: var(--ok); }
  .q-num.fail { color: var(--err); }

  /* 最近通话（poc recent-col） */
  .recent-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 10px; border-radius: 12px; cursor: pointer;
    transition: background .13s;
  }
  .recent-item:hover { background: var(--well); }
  .recent-item .ric {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center; font-size: 15px;
  }
  .recent-item .ric.in  { background: var(--grad-green); }
  .recent-item .ric.out { background: var(--grad-blue); }
  .recent-item .rmain { flex: 1; min-width: 0; }
  .recent-item .rnum { font-family: var(--mono); font-weight: 700; font-size: 14.5px; }
  .recent-item .rsub {
    font-size: 11.5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;
  }
  .recent-item .rtime { font-size: 11px; color: var(--dim); font-family: var(--mono); flex-shrink: 0; }
  .recent-more {
    display: block; text-align: center; margin-top: 8px; padding: 9px;
    color: var(--blue); font-size: 13px; cursor: pointer; border-radius: 10px;
  }
  .recent-more:hover { background: var(--blue-dim); }
  .empty { color: var(--dim); font-size: 13px; text-align: center; padding: 26px 0; }

  /* ========= 对话面板 ========= */
  #page-live .wrap { max-width: 860px; margin: 0 auto; }
  .live-head { display: flex; align-items: center; gap: 10px; }
  .live-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--ok); font-weight: 700;
  }
  .live-tag .ldot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 9px var(--ok); animation: breathe 1.2s infinite;
  }
  #chat { min-height: 300px; max-height: calc(100vh - 300px); overflow-y: auto; padding: 18px 20px; }
  #chat:empty::before { content: "等待通话转写…"; color: var(--dim); font-size: 13px; display: block; text-align: center; padding: 40px 0; }
  .bubble { margin-bottom: 14px; max-width: 82%; animation: rise .25s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
  .bubble .who { font-size: 10.5px; letter-spacing: .1em; color: var(--muted); margin-bottom: 4px; }
  .bubble .text {
    padding: 10px 14px; border-radius: 14px; font-size: 14.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word; border: 1px solid transparent;
  }
  .bubble.user .text {
    background: var(--blue-dim); border-color: rgba(10, 132, 255, .25);
    border-bottom-left-radius: 4px;
  }
  .bubble.agent { margin-left: auto; text-align: right; }
  .bubble.agent .text {
    background: var(--ok-dim); border-color: rgba(48, 209, 88, .22);
    border-bottom-right-radius: 4px; display: inline-block; text-align: left;
  }
  .bubble .time { font-size: 10px; color: var(--dim); margin-top: 3px; font-family: var(--mono); }

  /* ========= 短信面板 ========= */
  #page-sms .wrap { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  #smsList { max-height: calc(100vh - 420px); overflow-y: auto; padding: 14px 20px; }
  .sms-item {
    padding: 10px 13px; border-radius: 12px; margin-bottom: 10px;
    background: var(--well); border: 1px solid var(--border);
    border-left: 3px solid var(--dim);
  }
  .sms-item.in  { border-left-color: var(--blue); }
  .sms-item.out { border-left-color: var(--ok); }
  .sms-item .head {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono);
  }
  .sms-item.in .dir { color: var(--blue); font-weight: 700; }
  .sms-item.out .dir { color: var(--ok); font-weight: 700; }
  .sms-item .content { font-size: 13.5px; white-space: pre-wrap; word-break: break-word; }
  .sms-item .st.failed, .sms-item .st.error { color: var(--err); }
  .sms-form { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 9px; }
  .sms-form input, .sms-form textarea {
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 10px 13px; font-size: 14px; resize: vertical;
  }
  .sms-form input:focus, .sms-form textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .sms-form textarea { min-height: 58px; }
  .sms-form .row { display: flex; align-items: center; gap: 10px; }

  /* ========= 历史面板 ========= */
  #page-history .wrap { max-width: 900px; margin: 0 auto; }
  #historyList { padding: 14px 20px; }
  .hist-item {
    padding: 12px 14px; border-radius: 13px; margin-bottom: 10px;
    background: var(--well); border: 1px solid var(--border); cursor: pointer;
    transition: border-color .14s, transform .12s;
  }
  .hist-item:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .hist-item.open { border-color: rgba(10, 132, 255, .4); }
  .hist-item .head {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 11.5px; color: var(--muted); font-family: var(--mono);
  }
  .hist-item .num { font-size: 15.5px; font-weight: 700; color: var(--text); }
  .hist-item .dir.in  { color: var(--blue); }
  .hist-item .dir.out { color: var(--ok); }
  .hist-item .st.completed { color: var(--ok); }
  .hist-item .st.failed, .hist-item .st.not_connected { color: var(--err); }
  .hist-item .sum {
    font-size: 12.5px; color: var(--muted); margin-top: 7px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
    border-left: 2px solid rgba(10, 132, 255, .4); padding-left: 10px;
  }
  .timeline { display: none; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 8px; }
  .hist-item.open .timeline { display: block; }
  .tl-row { display: flex; gap: 10px; font-size: 11.5px; color: var(--muted); padding: 2.5px 0; font-family: var(--mono); }
  .tl-row .t  { color: var(--blue); min-width: 64px; flex-shrink: 0; }
  .tl-row .ty { color: var(--text); min-width: 88px; flex-shrink: 0; font-family: inherit; }
  .tl-row .detail { white-space: pre-wrap; word-break: break-word; }

  /* ========= 设置面板 ========= */
  #page-settings .wrap { max-width: 760px; margin: 0 auto; }
  #configForm { padding: 4px 20px 12px; }
  .cfg-group { margin-top: 16px; }
  .cfg-group > .gname {
    font-size: 11.5px; color: var(--blue); letter-spacing: .16em; font-weight: 700;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .cfg-row {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, .04);
  }
  .cfg-row label { font-size: 13.5px; flex: 1; }
  .cfg-row .key { display: block; font-size: 10px; color: var(--dim); font-family: var(--mono); }
  .tag-restart { font-size: 10px; color: var(--warn); margin-left: 6px; }
  .cfg-row input[type=text], .cfg-row select {
    width: 200px; background: var(--well); border: 1px solid var(--border);
    color: var(--text); border-radius: 9px; padding: 7px 10px; font-size: 13px; font-family: var(--mono);
  }
  .cfg-row input:disabled, .cfg-row select:disabled { opacity: .4; }
  .tag-secret {
    font-size: 11px; padding: 3px 12px; border-radius: 999px;
    background: var(--well); border: 1px solid var(--border); color: var(--muted);
  }
  .tag-secret.set { color: var(--ok); border-color: rgba(48, 209, 88, .4); }
  /* iOS 拟物开关（poc 语言：绿色+回弹） */
  .switch { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .knob {
    position: absolute; inset: 0; border-radius: 999px; cursor: pointer;
    background: rgba(120, 120, 128, .32); transition: background .2s;
  }
  .switch .knob::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 24px; height: 24px;
    border-radius: 50%; background: #fff;
    box-shadow: 0 2px 6px rgba(0, 0, 0, .35);
    transition: transform .25s cubic-bezier(.3, 1.4, .6, 1);
  }
  .switch input:checked + .knob { background: #34c759; }
  .switch input:checked + .knob::after { transform: translateX(20px); }
  .switch input:disabled + .knob { opacity: .4; cursor: default; }
  .cfg-save { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }

  /* ========= 底部胶囊 dock（poc 招牌）========= */
  .dock {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 30;
    display: flex; gap: 4px; padding: 7px;
    background: rgba(18, 24, 35, .82);
    border: 1px solid var(--border-strong); border-radius: 26px;
    backdrop-filter: blur(22px) saturate(1.5);
    box-shadow: 0 20px 50px rgba(0, 0, 0, .55), 0 4px 16px rgba(10, 132, 255, .1),
      inset 0 1px 0 rgba(255, 255, 255, .08);
  }
  .dock button {
    width: 84px; height: 58px; border: none; border-radius: 19px; cursor: pointer;
    background: transparent; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    font-size: 11.5px; font-weight: 600;
    transition: background .18s, color .18s, transform .18s;
  }
  .dock button .ico { font-size: 18px; line-height: 1; }
  .dock button:hover { color: var(--text); background: rgba(255, 255, 255, .05); transform: translateY(-2px); }
  .dock button.active {
    color: #fff; background: var(--grad-blue);
    box-shadow: 0 4px 18px rgba(10, 132, 255, .5), inset 0 1px 0 rgba(255, 255, 255, .25);
  }
  /* dock 上的 live 红点提示（通话中且不在对话面板时） */
  .dock button .dot {
    position: absolute; margin-top: -26px; margin-left: 42px;
    width: 9px; height: 9px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 8px var(--ok); display: none;
  }
  .dock button.notify .dot { display: block; animation: breathe 1.2s infinite; }

  /* ========= DTMF 键盘浮层 ========= */
  .keypad {
    display: none; position: fixed; right: 26px; top: 66px; z-index: 40;
    background: rgba(18, 24, 35, .95); border: 1px solid var(--border-strong);
    border-radius: 16px; padding: 13px;
    backdrop-filter: blur(20px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, .6);
  }
  .keypad.show { display: block; }
  .keypad .keys { display: grid; grid-template-columns: repeat(3, 58px); gap: 8px; }
  .keypad .keys button {
    height: 46px; font-family: var(--mono); font-size: 18px; font-weight: 700;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; cursor: pointer; transition: all .12s;
  }
  .keypad .keys button:hover { border-color: var(--blue); color: var(--blue); }
  .keypad .keys button:active { background: var(--blue-dim); }
  .keypad .sent {
    margin-top: 9px; font-family: var(--mono); font-size: 12px; color: var(--ok);
    min-height: 15px; letter-spacing: .22em; text-align: center;
  }
</style>
</head>
<body>
  <header>
    <div class="logo">📞</div>
    <div class="titlebox"><b>AgentCall</b><span>田野的数字分身</span></div>
    <span class="state-chip idle" id="stateChip">
      <span class="sdot"></span><span id="stateText">待命</span><span class="num" id="stateNum"></span>
    </span>
    <div class="quick-acts" id="quickActs">
      <button class="btn sm ghost" id="keypadBtn">⌗ 按键</button>
      <button class="btn sm danger" id="hangupBtn">挂断</button>
    </div>
    <span class="spacer"></span>
    <div class="meta">
      <span><span id="dot" class="conn-dot"></span><span id="conn">连接中</span></span>
      <span>MODEL <b id="model">-</b></span>
      <span>PROVIDER <b id="provider">-</b></span>
    </div>
  </header>

  <main>
    <!-- 电话（主页，poc 双卡） -->
    <div class="panel-page active" id="page-phone">
      <div class="wrap">
        <section class="card">
          <div class="home-grid">
            <div class="dial-col">
              <div class="col-label">拨打电话</div>
              <input id="dialNumber" class="dial-input" type="text" placeholder="输入号码" />
              <input id="dialTask" class="task-input" type="text" placeholder="外呼主题（空=沿用上次）" />
              <div class="dial-actions">
                <button class="btn primary" id="dialBtn">拨打</button>
              </div>
              <div class="toast" id="dialToast"></div>
              <div class="batch-zone">
                <div class="col-label">批量外呼</div>
                <textarea id="batchNumbers" placeholder="每行一个号码，可批量粘贴"></textarea>
                <input id="batchTask" type="text" placeholder="本批次任务说明（可选）" />
                <div class="batch-actions">
                  <button class="btn sm ghost" id="batchDialBtn">加入队列</button>
                  <span class="toast" id="batchToast" style="margin:0"></span>
                </div>
                <div class="q-chips" id="queueStatus"><div class="q-stat">队列空闲</div></div>
              </div>
            </div>
            <div class="recent-col">
              <div class="col-label">最近通话</div>
              <div id="recentList"><div class="empty">暂无通话</div></div>
              <span class="recent-more" id="recentMore">查看全部历史 →</span>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- 实时对话 -->
    <div class="panel-page" id="page-live">
      <div class="wrap">
        <section class="card">
          <h2>实时对话
            <span class="live-tag" id="liveTag" style="display:none"><span class="ldot"></span>LIVE</span>
            <span class="sub" id="liveSub">通话开始后自动进入本页</span>
          </h2>
          <div id="chat"></div>
        </section>
      </div>
    </div>

    <!-- 短信 -->
    <div class="panel-page" id="page-sms">
      <div class="wrap">
        <section class="card">
          <h2>短信</h2>
          <div id="smsList"><div class="empty" id="smsEmpty">暂无短信</div></div>
          <div class="sms-form">
            <input id="smsNumber" type="text" placeholder="对方号码" />
            <textarea id="smsText" placeholder="短信内容（支持中文）"></textarea>
            <div class="row">
              <button class="btn primary sm" id="smsSend">发送短信</button>
              <span class="toast" id="smsToast" style="margin:0"></span>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- 历史 -->
    <div class="panel-page" id="page-history">
      <div class="wrap">
        <section class="card">
          <h2>通话历史<span class="sub">点击展开事件时间线</span></h2>
          <div id="historyList"><div class="empty">暂无通话记录</div></div>
        </section>
      </div>
    </div>

    <!-- 设置 -->
    <div class="panel-page" id="page-settings">
      <div class="wrap">
        <section class="card">
          <h2>系统设置<span class="sub" id="portSub"></span></h2>
          <div id="configForm"><div class="empty">正在加载配置…</div></div>
          <div class="cfg-save">
            <button class="btn primary sm" id="configSave">保存设置</button>
            <span class="toast" id="configToast" style="margin:0"></span>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- 底部胶囊 dock -->
  <nav class="dock" id="dock">
    <button data-page="phone" class="active"><span class="ico">📞</span>电话<span class="dot"></span></button>
    <button data-page="live"><span class="ico">💬</span>对话<span class="dot"></span></button>
    <button data-page="sms"><span class="ico">✉️</span>短信<span class="dot"></span></button>
    <button data-page="history"><span class="ico">🕘</span>历史<span class="dot"></span></button>
    <button data-page="settings"><span class="ico">⚙️</span>设置<span class="dot"></span></button>
  </nav>

  <div class="keypad" id="keypad">
    <div class="keys"></div>
    <div class="sent" id="dtmfSent"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const stateText = { ringing: "振铃中", dialing: "拨号中", answered: "通话中", ended: "已结束", idle: "待命" };

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;   // 全量 textContent，防注入
  return n;
}
function fmtTime(ts) {
  const d = ts ? new Date(ts * 1000) : new Date();
  return d.toLocaleTimeString("zh-CN", { hour12: false });
}
function fmtDateTime(ts) {
  if (!ts) return "-";
  return new Date(ts * 1000).toLocaleString("zh-CN", {
    hour12: false, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit",
  });
}
async function postJson(url, body) {
  const r = await fetch(url, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return { httpOk: r.ok, res: await r.json() };
}
function setToast(id, cls, text) { const t = $(id); t.className = t.className.replace(/\b(ok|err)\b/g, "").trim(); if (cls) t.classList.add(cls); t.textContent = text; }

/* ========= 面板切换 ========= */
let currentPage = "phone";
function switchPage(name) {
  currentPage = name;
  document.querySelectorAll(".panel-page").forEach((p) => p.classList.toggle("active", p.id === "page-" + name));
  document.querySelectorAll(".dock button").forEach((b) => {
    b.classList.toggle("active", b.dataset.page === name);
    if (b.dataset.page === name) b.classList.remove("notify");
  });
  if (name === "history") loadHistory();
}
document.querySelectorAll(".dock button").forEach((b) =>
  b.addEventListener("click", () => switchPage(b.dataset.page)));

/* ========= 全局通话状态 ========= */
let callActive = false;
let backTimer = null;
function setCall(status, caller) {
  const chip = $("stateChip");
  chip.className = "state-chip " + status;
  $("stateText").textContent = stateText[status] || status;
  $("stateNum").textContent = status === "idle" ? "" : (caller || "");
  callActive = (status === "ringing" || status === "dialing" || status === "answered");
  $("quickActs").classList.toggle("show", callActive);
  $("liveTag").style.display = callActive ? "inline-flex" : "none";
  $("liveSub").textContent = callActive ? (caller || "") : "通话开始后自动进入本页";
  if (!callActive) { $("keypad").classList.remove("show"); $("dtmfSent").textContent = ""; }

  if (callActive) {
    clearTimeout(backTimer);
    // 通话开始：自动切到对话面板（poc 行为）
    if (currentPage !== "live") switchPage("live");
  } else if (status === "ended" && currentPage === "live") {
    // 结束后 4s 自动回电话主页
    clearTimeout(backTimer);
    backTimer = setTimeout(() => { if (!callActive) switchPage("phone"); }, 4000);
  }
}

/* ========= 实时对话 ========= */
function addTranscript(role, text, ts) {
  const chat = $("chat");
  const b = el("div", "bubble " + (role === "user" ? "user" : "agent"));
  b.appendChild(el("div", "who", role === "user" ? "对方" : "数字分身"));
  b.appendChild(el("div", "text", text));
  b.appendChild(el("div", "time", fmtTime(ts)));
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
  if (currentPage !== "live") {
    document.querySelector('.dock button[data-page="live"]').classList.add("notify");
  }
}

/* ========= 短信 ========= */
function addSms(event) {
  $("smsEmpty")?.remove();
  const isIn = event.type === "sms_in";
  const item = el("div", "sms-item " + (isIn ? "in" : "out"));
  const head = el("div", "head");
  const who = isIn ? (event.sender || "未知") : (event.number || "");
  head.appendChild(el("span", "dir", (isIn ? "收 ← " : "发 → ") + who));
  const right = el("span");
  right.appendChild(el("span", "", fmtTime(event.ts) + " "));
  if (event.status) right.appendChild(el("span", "st " + event.status, event.status));
  head.appendChild(right);
  item.appendChild(head);
  item.appendChild(el("div", "content", event.text || ""));
  $("smsList").insertBefore(item, $("smsList").firstChild);
  if (isIn && currentPage !== "sms") {
    document.querySelector('.dock button[data-page="sms"]').classList.add("notify");
  }
}

/* ========= WebSocket ========= */
function handleEvent(ev) {
  if (ev.type === "call") {
    setCall(ev.status, ev.caller);
    if (ev.status === "ended") setTimeout(() => { loadHistory(); loadRecent(); }, 1200);
  } else if (ev.type === "transcript") {
    addTranscript(ev.role, ev.text, ev.ts);
  } else if (ev.type === "sms_in" || ev.type === "sms_out") {
    addSms(ev);
  } else if (ev.type === "call_summary") {
    loadHistory(); loadRecent();
  }
}
let ws;
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => { $("dot").classList.add("on"); $("conn").textContent = "已连接"; };
  ws.onclose = () => {
    $("dot").classList.remove("on"); $("conn").textContent = "重连中";
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch (err) {} };
}
async function loadMeta() {
  try {
    const m = await (await fetch("/api/meta")).json();
    $("model").textContent = m.model || "-";
    $("provider").textContent = m.provider || "-";
    $("portSub").textContent = "模组 " + (m.port || "-");
  } catch (e) {}
}

/* ========= 拨打 / 挂断 / 键盘 ========= */
async function doDial() {
  const number = $("dialNumber").value.trim();
  if (!number) { setToast("dialToast", "err", "请填写号码"); return; }
  const task = $("dialTask").value.trim();
  const btn = $("dialBtn");
  btn.disabled = true; setToast("dialToast", "", "呼叫中…");
  try {
    const { res } = await postJson("/api/call/dial", { number, task: task || null });
    if (res.ok) {
      setToast("dialToast", "ok", "已发起呼叫");
      if (task) { updateTaskPlaceholder(task); $("dialTask").value = ""; }
    } else setToast("dialToast", "err", res.error || "呼叫失败");
  } catch (err) { setToast("dialToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
}
$("dialBtn").addEventListener("click", doDial);
$("dialNumber").addEventListener("keydown", (e) => { if (e.key === "Enter") doDial(); });

function updateTaskPlaceholder(task) {
  const t = (task || "").trim();
  if (t) $("dialTask").placeholder = "主题（空=沿用）：" + (t.length > 22 ? t.slice(0, 22) + "…" : t);
}
async function loadDefaultTask() {
  try {
    const specs = await (await fetch("/api/config")).json();
    const spec = specs.find((c) => c.key === "AGENT_OUTBOUND_TASK");
    if (spec) updateTaskPlaceholder(spec.value);
  } catch (e) {}
}

$("hangupBtn").addEventListener("click", async () => {
  const btn = $("hangupBtn");
  btn.disabled = true;
  try { await postJson("/api/call/hangup", {}); } catch (e) {}
  btn.disabled = false;
});

(function initKeypad() {
  const keys = document.querySelector("#keypad .keys");
  for (const k of ["1","2","3","4","5","6","7","8","9","*","0","#"]) {
    const b = el("button", "", k);
    b.addEventListener("click", async () => {
      try {
        const { res } = await postJson("/api/call/dtmf", { digits: k });
        if (res.ok) $("dtmfSent").textContent = ($("dtmfSent").textContent + k).slice(-16);
        else $("dtmfSent").textContent = "发送失败";
      } catch (e) { $("dtmfSent").textContent = "请求出错"; }
    });
    keys.appendChild(b);
  }
})();
$("keypadBtn").addEventListener("click", () => $("keypad").classList.toggle("show"));

/* ========= 发短信 ========= */
$("smsSend").addEventListener("click", async () => {
  const number = $("smsNumber").value.trim();
  const text = $("smsText").value;
  if (!number || !text.trim()) { setToast("smsToast", "err", "请填写号码和内容"); return; }
  const btn = $("smsSend");
  btn.disabled = true; setToast("smsToast", "", "发送中…");
  try {
    const { res } = await postJson("/api/sms/send", { number, text });
    if (res.ok) { setToast("smsToast", "ok", "已发送"); $("smsText").value = ""; }
    else setToast("smsToast", "err", "发送失败：" + (res.error || "未知错误"));
  } catch (err) { setToast("smsToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

/* ========= 历史 + 最近通话 ========= */
const dirText = { inbound: "呼入", outbound: "呼出" };
const statusText = { completed: "已完成", failed: "异常", not_connected: "未接通" };
const openCalls = new Set();
let historyCache = [];

function evTypeText(ev) {
  const m = {
    call_started: "通话开始", dialing: "拨号", connected: "接通", answered: "已接听",
    bridge_started: "音频桥就绪", agent_started: "Agent 就绪", greeting_sent: "开场白",
    latency: "延迟打点", summary: "生成摘要", ended: "会话收尾",
    call_finished: "通话结束", not_connected: "未接通", dtmf: "发送按键",
  };
  if (ev.type === "transcript") return ev.role === "user" ? "对方说" : "分身说";
  return m[ev.type] || ev.type;
}
function evDetail(ev) {
  if (ev.type === "transcript") return ev.text || "";
  if (ev.type === "latency") return `${ev.stage || ""} ${Math.round(ev.ms || 0)}ms`;
  if (ev.type === "call_finished") return statusText[ev.status] || ev.status || "";
  if (ev.type === "dialing") return ev.number || "";
  if (ev.type === "dtmf") return ev.digits || "";
  return "";
}
async function loadTimeline(tl, id) {
  try {
    const r = await fetch(`/api/history/${encodeURIComponent(id)}/events`);
    if (!r.ok) return;
    const events = await r.json();
    tl.textContent = "";
    for (const ev of events) {
      const row = el("div", "tl-row");
      row.appendChild(el("span", "t", ev.ts ? fmtTime(ev.ts) : ""));
      row.appendChild(el("span", "ty", evTypeText(ev)));
      row.appendChild(el("span", "detail", evDetail(ev)));
      tl.appendChild(row);
    }
    tl.dataset.loaded = "1";
  } catch (e) {}
}
async function toggleHistItem(item, id) {
  if (item.classList.contains("open")) { item.classList.remove("open"); openCalls.delete(id); return; }
  const tl = item.querySelector(".timeline");
  if (!tl.dataset.loaded) await loadTimeline(tl, id);
  item.classList.add("open"); openCalls.add(id);
}
async function fetchHistory() {
  const r = await fetch("/api/history?limit=50");
  if (!r.ok) return [];
  historyCache = await r.json();
  return historyCache;
}
async function loadHistory() {
  try {
    const calls = await fetchHistory();
    const list = $("historyList");
    list.textContent = "";
    if (!calls.length) { list.appendChild(el("div", "empty", "暂无通话记录")); return; }
    for (const c of calls) {
      const item = el("div", "hist-item");
      const head1 = el("div", "head");
      head1.appendChild(el("span", "num", c.number || "未知号码"));
      const right = el("span");
      right.appendChild(el("span", "dir " + (c.direction === "inbound" ? "in" : "out"),
        dirText[c.direction] || c.direction || "?"));
      right.appendChild(document.createTextNode(" "));
      right.appendChild(el("span", "st " + (c.status || ""), statusText[c.status] || c.status || ""));
      head1.appendChild(right);
      item.appendChild(head1);
      const head2 = el("div", "head");
      head2.appendChild(el("span", "", fmtDateTime(c.started_at)));
      item.appendChild(head2);
      const summaryText = c.summary && c.summary.summary ? c.summary.summary : "";
      if (summaryText) item.appendChild(el("div", "sum", summaryText));
      item.appendChild(el("div", "timeline"));
      item.addEventListener("click", () => toggleHistItem(item, c.id));
      list.appendChild(item);
      if (openCalls.has(c.id)) {
        loadTimeline(item.querySelector(".timeline"), c.id);
        item.classList.add("open");
      }
    }
  } catch (e) {}
}
/* 电话主页右列：最近 6 条 */
async function loadRecent() {
  try {
    const calls = historyCache.length ? historyCache : await fetchHistory();
    const list = $("recentList");
    list.textContent = "";
    if (!calls.length) { list.appendChild(el("div", "empty", "暂无通话")); return; }
    for (const c of calls.slice(0, 6)) {
      const item = el("div", "recent-item");
      const isIn = c.direction === "inbound";
      item.appendChild(el("div", "ric " + (isIn ? "in" : "out"), isIn ? "↓" : "↑"));
      const main = el("div", "rmain");
      main.appendChild(el("div", "rnum", c.number || "未知号码"));
      const sub = (c.summary && c.summary.summary) || statusText[c.status] || "";
      main.appendChild(el("div", "rsub", sub));
      item.appendChild(main);
      item.appendChild(el("div", "rtime", fmtDateTime(c.started_at)));
      item.addEventListener("click", () => switchPage("history"));
      list.appendChild(item);
    }
  } catch (e) {}
}
$("recentMore").addEventListener("click", () => switchPage("history"));

/* ========= 批量外呼 ========= */
function queueChip(parent, text, cls) {
  parent.appendChild(el("span", "q-num" + (cls ? " " + cls : ""), text));
}
async function refreshQueue() {
  try {
    const r = await fetch("/api/call/queue");
    if (!r.ok) return;
    const q = await r.json();
    const box = $("queueStatus");
    box.textContent = "";
    const statText = q.active
      ? `队列进行中 · 待拨 ${q.pending.length} · 已拨 ${(q.done || []).length}`
      : ((q.done || []).length ? `队列空闲 · 本轮已拨 ${q.done.length}` : "队列空闲");
    box.appendChild(el("div", "q-stat", statText));
    if (q.current) queueChip(box, `${q.current} 拨打中`, "cur");
    for (const n of q.pending) queueChip(box, n);
    for (const d of (q.done || []).slice(-10)) {
      queueChip(box, `${d.number} ${d.ok ? "✓" : "✗" + (d.error ? " " + d.error : "")}`, d.ok ? "ok" : "fail");
    }
  } catch (e) {}
}
$("batchDialBtn").addEventListener("click", async () => {
  const numbers = $("batchNumbers").value
    .split(/[\r\n,，;；]+/).map((s) => s.trim()).filter(Boolean);
  const task = $("batchTask").value.trim();
  if (!numbers.length) { setToast("batchToast", "err", "请填写至少一个号码"); return; }
  const btn = $("batchDialBtn");
  btn.disabled = true; setToast("batchToast", "", "入队中…");
  try {
    const { httpOk, res } = await postJson("/api/call/batch_dial", { numbers, task: task || null });
    if (httpOk) {
      let msg = `已入队 ${res.accepted.length} 个`;
      if (res.rejected.length) msg += `，拒绝 ${res.rejected.length} 个`;
      setToast("batchToast", res.accepted.length ? "ok" : "err", msg);
      if (res.accepted.length) $("batchNumbers").value = "";
      if (task) updateTaskPlaceholder(task);
      refreshQueue();
    } else setToast("batchToast", "err", "入队失败：" + (res.error || "未知错误"));
  } catch (err) { setToast("batchToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

/* ========= 设置 ========= */
let cfgSpecs = [];
const truthy = ["true", "1", "yes"];
const boolChecked = (v) => truthy.includes(String(v).trim().toLowerCase());
function cfgGroup(key) {
  if (/^(AGENT_PROVIDER|QWEN_|AGENT_MODEL|AGENT_OUTBOUND|DASHSCOPE)/.test(key)) return "AI 与人设";
  if (/^MODEM_/.test(key)) return "模组与音频";
  if (/^(RECORDING_|SUMMARY_|CALL_LOG|HALF_DUPLEX|HANGUP_)/.test(key)) return "通话与记录";
  if (/^MONITOR_/.test(key)) return "本机监听";
  if (/^(DIAL_|SMS_)/.test(key)) return "外呼与短信";
  return "系统";
}
async function loadConfig() {
  try {
    const r = await fetch("/api/config");
    if (!r.ok) return;
    cfgSpecs = await r.json();
    const form = $("configForm");
    form.textContent = "";
    const groups = new Map();
    for (const c of cfgSpecs) {
      const g = cfgGroup(c.key);
      if (!groups.has(g)) {
        const wrap = el("div", "cfg-group");
        wrap.appendChild(el("div", "gname", g));
        groups.set(g, wrap);
        form.appendChild(wrap);
      }
      const row = el("div", "cfg-row");
      const label = el("label", "", c.label);
      if (c.requires_restart) label.appendChild(el("span", "tag-restart", "改后需重启"));
      label.appendChild(el("span", "key", c.key));
      row.appendChild(label);

      let ctrl;
      if (c.secret) {
        ctrl = el("span", "tag-secret" + (c.value === "已设置" ? " set" : ""), c.value);
        row.appendChild(ctrl);
      } else if (c.kind === "bool") {
        const sw = el("label", "switch");
        ctrl = document.createElement("input");
        ctrl.type = "checkbox";
        ctrl.checked = boolChecked(c.value);
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        sw.appendChild(ctrl);
        sw.appendChild(el("span", "knob"));
        row.appendChild(sw);
      } else if (c.kind === "select") {
        ctrl = document.createElement("select");
        for (const ch of c.choices) {
          const opt = document.createElement("option");
          opt.value = ch; opt.textContent = ch;
          ctrl.appendChild(opt);
        }
        ctrl.value = c.value;
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        row.appendChild(ctrl);
      } else {
        ctrl = document.createElement("input");
        ctrl.type = "text";
        ctrl.value = c.value;
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        row.appendChild(ctrl);
      }
      groups.get(g).appendChild(row);
    }
  } catch (e) {}
}
$("configSave").addEventListener("click", async () => {
  const updates = {};
  for (const c of cfgSpecs) {
    if (!c.editable || c.secret) continue;
    const ctrl = document.querySelector(`#configForm [data-key="${c.key}"]`);
    if (!ctrl) continue;
    const val = c.kind === "bool" ? (ctrl.checked ? "true" : "false") : ctrl.value;
    const orig = c.kind === "bool" ? (boolChecked(c.value) ? "true" : "false") : String(c.value);
    if (val !== orig) updates[c.key] = val;
  }
  if (!Object.keys(updates).length) { setToast("configToast", "", "没有需要保存的修改"); return; }
  const btn = $("configSave");
  btn.disabled = true; setToast("configToast", "", "保存中…");
  try {
    const { httpOk, res } = await postJson("/api/config", updates);
    if (httpOk) {
      let msg = `已保存 ${res.updated.length} 项`;
      if (res.requires_restart.length) msg += `，其中 ${res.requires_restart.length} 项需重启生效`;
      setToast("configToast", "ok", msg);
      loadConfig();
    } else setToast("configToast", "err", "保存失败：" + (res.error || "未知错误"));
  } catch (err) { setToast("configToast", "err", "请求出错"); }
  finally { btn.disabled = false; }
});

loadMeta();
connect();
loadHistory().then(loadRecent);
refreshQueue();
loadConfig();
loadDefaultTask();
setInterval(refreshQueue, 2000);
</script>
</body>
</html>
