<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>CallPilot</title>
<style>
  /* ========= 设计基座：iOS 深色玻璃态（借鉴 Agent for Call.app）========= */
  :root {
    --bg: #0a0e16;
    --surface: rgba(24, 30, 42, .55);
    --surface-strong: rgba(32, 39, 54, .6);
    --well: rgba(10, 14, 22, .5);
    --border: rgba(255, 255, 255, .08);
    --border-strong: rgba(255, 255, 255, .15);
    --text: #ebeff5;
    --muted: #97a1b0;
    --dim: #5d6878;
    --blue: #0a84ff;
    --blue-dim: rgba(10, 132, 255, .12);
    --ok: #30d158;
    --ok-dim: rgba(48, 209, 88, .12);
    --warn: #ffd60a;
    --warn-dim: rgba(255, 214, 10, .12);
    --err: #ff453a;
    --err-dim: rgba(255, 69, 58, .12);
    --mono: "SF Mono", Menlo, monospace;
    --grad-blue: linear-gradient(180deg, #1789f0, #0071d6 55%, #005bb8);
    --grad-green: linear-gradient(160deg, #34c759, #1e9e43);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.55 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background:
      radial-gradient(900px 480px at 82% -8%, rgba(10, 132, 255, .13), transparent 60%),
      radial-gradient(760px 520px at -6% 108%, rgba(48, 209, 88, .07), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ========= 顶部全局状态条 ========= */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(14, 19, 29, .72);
    backdrop-filter: blur(18px) saturate(1.4);
    position: relative; z-index: 20;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; overflow: hidden;
    display: grid; place-items: center;
    filter: drop-shadow(0 2px 8px rgba(67, 230, 154, .35));
  }
  .logo svg { display: block; width: 100%; height: 100%; }
  .titlebox b { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
  .titlebox span { display: block; font-size: 11px; color: var(--muted); }
  /* 全局状态 chip：随通话状态换色 + 呼吸 */
  .state-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 999px; margin-left: 10px;
    background: var(--well); border: 1px solid var(--border);
    font-size: 12.5px; font-weight: 600;
  }
  .state-chip .sdot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--dim);
  }
  .state-chip.idle .sdot { background: var(--dim); }
  .state-chip.ringing, .state-chip.dialing { border-color: rgba(255, 214, 10, .4); color: var(--warn); }
  .state-chip.ringing .sdot, .state-chip.dialing .sdot {
    background: var(--warn); box-shadow: 0 0 10px var(--warn);
    animation: breathe 1s ease-in-out infinite;
  }
  .state-chip.answered { border-color: rgba(48, 209, 88, .45); color: var(--ok); }
  .state-chip.answered .sdot {
    background: var(--ok); box-shadow: 0 0 10px var(--ok);
    animation: breathe 1.5s ease-in-out infinite;
  }
  .state-chip.ended { border-color: rgba(255, 69, 58, .4); color: var(--err); }
  .state-chip.ended .sdot { background: var(--err); }
  .state-chip .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .recording-badge {
    display: none; align-items: center; gap: 5px; padding-left: 8px;
    border-left: 1px solid var(--border-strong); color: var(--err); font-size: 10px; font-weight: 800;
  }
  .recording-badge.show { display: inline-flex; }
  .recording-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--err); }
  @keyframes breathe { 50% { transform: scale(.7); opacity: .7; } }

  header .spacer { flex: 1; }
  /* 通话中快捷操作（任意面板可见） */
  .quick-acts { display: none; gap: 8px; }
  .quick-acts.show { display: flex; }
  .meta { display: flex; gap: 14px; font-size: 11.5px; color: var(--muted); font-family: var(--mono); }
  .meta b { color: var(--text); font-weight: 500; }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    background: var(--err); box-shadow: 0 0 8px var(--err); margin-right: 5px;
  }
  .conn-dot.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

  /* ========= 按钮体系（poc 语言：渐变 primary + 透明 danger）========= */
  button { font-family: inherit; }
  .btn {
    border: none; border-radius: 11px; padding: 10px 18px;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .02em;
    transition: filter .15s, transform .06s, box-shadow .2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.primary {
    background: var(--grad-blue); color: #fff;
    box-shadow: 0 2px 14px rgba(10, 132, 255, .35), inset 0 1px 0 rgba(255, 255, 255, .22);
  }
  .btn.primary:hover { filter: brightness(1.12); box-shadow: 0 2px 20px rgba(10, 132, 255, .55); }
  .btn.danger {
    background: var(--err-dim); color: var(--err); border: 1px solid rgba(255, 69, 58, .4);
  }
  .btn.danger:hover { background: rgba(255, 69, 58, .22); }
  .btn.ghost {
    background: var(--well); color: var(--text); border: 1px solid var(--border);
  }
  .btn.ghost:hover { border-color: var(--border-strong); }
  .btn.sm { padding: 7px 14px; font-size: 13px; border-radius: 9px; }

  /* ========= 主区：分面板 ========= */
  main {
    height: calc(100vh - 57px);
    overflow: hidden; position: relative; z-index: 1;
  }
  .panel-page {
    display: none; height: 100%; overflow-y: auto;
    padding: 20px 24px 110px;  /* 底部给 dock 留空间（poc 教训） */
  }
  .panel-page.active { display: block; animation: fadein .22s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } }
  .panel-page::-webkit-scrollbar { width: 9px; }
  .panel-page::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

  /* 玻璃卡片（poc 核心质感） */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    backdrop-filter: blur(18px) saturate(1.4);
    box-shadow: 0 8px 28px rgba(0, 0, 0, .35), inset 0 1px 0 rgba(255, 255, 255, .06);
    overflow: hidden;
  }
  .card > h2 {
    margin: 0; padding: 14px 20px; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 9px;
    border-bottom: 1px solid var(--border);
  }
  .card > h2 .sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: auto; }
  .card .inner { padding: 16px 20px; }

  /* ========= 电话面板：双卡布局（poc home-card）========= */
  #page-phone .wrap { max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .home-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: 0; }
  .home-grid .dial-col { padding: 22px 26px; border-right: 1px solid var(--border); }
  .home-grid .recent-col { padding: 22px 24px; }
  .col-label { font-size: 11px; letter-spacing: .18em; color: var(--muted); margin-bottom: 12px; font-weight: 700; }
  .preset-label { margin: 0 0 8px; letter-spacing: .14em; }
  .preset-select {
    width: 100%; margin-bottom: 10px;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 10px 12px; font-size: 13.5px;
    color-scheme: dark;
    transition: border-color .15s, box-shadow .15s;
  }
  .preset-select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .preset-select option { background: #111823; color: var(--text); }

  .dial-input {
    width: 100%; text-align: center;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 14px; padding: 14px;
    font-family: var(--mono); font-size: 26px; font-weight: 700; letter-spacing: .1em;
    font-variant-numeric: tabular-nums;
    transition: border-color .15s, box-shadow .15s;
  }
  .dial-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-dim); }
  .task-input {
    width: 100%; margin-top: 10px;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 11px 14px; font-size: 14px;
  }
  .task-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .dial-actions { display: flex; gap: 10px; margin-top: 14px; }
  .dial-actions .btn { flex: 1; padding: 14px; font-size: 16px; }
  .remote-invite { display: none; margin-top: 10px; gap: 8px; align-items: center; }
  .remote-invite.show { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; }
  .remote-invite input { min-width: 0; font-size: 12px; }
  .remote-pair { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .remote-pair.show { display: block; }
  .remote-pair-head { display: grid; grid-template-columns: 92px minmax(0, 1fr) auto; gap: 8px; align-items: center; }
  .remote-pair-code { font-family: var(--mono); font-weight: 700; color: var(--blue); }
  .remote-pair-head input { min-width: 0; font-size: 12px; }
  .remote-cloud { display: none; gap: 8px; margin: 8px 0; padding: 10px; border: 1px solid var(--border); background: var(--well); }
  .remote-cloud.show { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto; }
  .remote-cloud-status { grid-column: 1 / -1; color: var(--muted); font-size: 12px; }
  .remote-devices { margin-top: 8px; display: grid; gap: 6px; }
  .remote-device { min-height: 32px; display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; }
  @media(max-width:520px) {
    .remote-invite.show { grid-template-columns: 1fr 1fr; }
    .remote-invite input { grid-column: 1 / -1; }
    .remote-pair-head { grid-template-columns: 1fr auto; }
    .remote-pair-head input { grid-column: 1 / -1; grid-row: 2; }
  }
  .toast { font-size: 12px; min-height: 16px; color: var(--muted); margin-top: 8px; }
  .toast.ok { color: var(--ok); }
  .toast.err { color: var(--err); }

  /* 批量外呼（拨号列内折叠区） */
  .batch-zone { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 16px; }
  .batch-zone textarea {
    width: 100%; min-height: 62px; resize: vertical;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 10px 12px; font-family: var(--mono); font-size: 13px;
  }
  .batch-zone textarea:focus, .batch-zone input:focus { outline: none; border-color: var(--blue); }
  .batch-zone input {
    width: 100%; margin-top: 8px;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 9px 12px; font-size: 13.5px;
  }
  .batch-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .q-chips { margin-top: 10px; }
  .q-stat { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .q-num {
    display: inline-block; background: var(--well); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px 10px; margin: 2px 5px 2px 0;
    font-size: 12px; font-family: var(--mono);
  }
  .q-num.cur { border-color: var(--blue); color: var(--blue); animation: breathe 1.4s infinite; }
  .q-num.ok { color: var(--ok); }
  .q-num.fail { color: var(--err); }
  .q-table { width: 100%; margin-top: 8px; border-collapse: collapse; font-size: 12px; }
  .q-table th { text-align: left; color: var(--dim); font-weight: 500; padding: 4px 8px;
    border-bottom: 1px solid rgba(255,255,255,.08); }
  .q-table td { padding: 4px 8px; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,.04); }
  .q-table td.ok { color: var(--ok); }
  .q-table td.fail { color: var(--err); }

  /* 最近通话（poc recent-col） */
  .recent-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 10px; border-radius: 12px; cursor: pointer;
    transition: background .13s;
  }
  .recent-item:hover { background: var(--well); }
  .recent-item .ric {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center; font-size: 15px;
  }
  .recent-item .ric.in  { background: var(--grad-green); }
  .recent-item .ric.out { background: var(--grad-blue); }
  .recent-item .rmain { flex: 1; min-width: 0; }
  .recent-item .rnum { font-family: var(--mono); font-weight: 700; font-size: 14.5px; }
  .recent-item .rsub {
    font-size: 11.5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;
  }
  .recent-item .rtime { font-size: 11px; color: var(--dim); font-family: var(--mono); flex-shrink: 0; }
  .recent-more {
    display: block; text-align: center; margin-top: 8px; padding: 9px;
    color: var(--blue); font-size: 13px; cursor: pointer; border-radius: 10px;
  }
  .recent-more:hover { background: var(--blue-dim); }
  .empty { color: var(--dim); font-size: 13px; text-align: center; padding: 26px 0; }

  /* ========= 对话面板 ========= */
  #page-live .wrap { max-width: 860px; margin: 0 auto; }
  .live-head { display: flex; align-items: center; gap: 10px; }
  .live-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--ok); font-weight: 700;
  }
  .live-tag .ldot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 9px var(--ok); animation: breathe 1.2s infinite;
  }
  .listen-btn {
    margin-left: auto; font-size: 12px; padding: 5px 11px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent; color: var(--muted);
    cursor: pointer; font-family: var(--mono);
  }
  .listen-btn.on { color: var(--ok); border-color: var(--ok); box-shadow: 0 0 9px rgba(67,230,154,.4); }
  #chat { min-height: 300px; max-height: calc(100vh - 300px); overflow-y: auto; padding: 18px 20px; }
  #chat:empty::before { content: attr(data-empty); color: var(--dim); font-size: 13px; display: block; text-align: center; padding: 40px 0; }
  /* 通话之间的分割线：一行居中标签 + 两侧渐隐横线 */
  .call-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 2px 18px; color: var(--dim);
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
  }
  .call-divider::before, .call-divider::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
  }
  .bubble { margin-bottom: 14px; max-width: 82%; animation: rise .25s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
  .bubble .who { font-size: 10.5px; letter-spacing: .1em; color: var(--muted); margin-bottom: 4px; }
  .bubble .text {
    padding: 10px 14px; border-radius: 14px; font-size: 14.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word; border: 1px solid transparent;
  }
  .bubble.user .text {
    background: var(--blue-dim); border-color: rgba(10, 132, 255, .25);
    border-bottom-left-radius: 4px;
  }
  .bubble.agent { margin-left: auto; text-align: right; }
  .bubble.agent .text {
    background: var(--ok-dim); border-color: rgba(48, 209, 88, .22);
    border-bottom-right-radius: 4px; display: inline-block; text-align: left;
  }
  .bubble .time { font-size: 10px; color: var(--dim); margin-top: 3px; font-family: var(--mono); }

  /* ========= 短信面板 ========= */
  #page-sms .wrap { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  #smsList { max-height: calc(100vh - 420px); overflow-y: auto; padding: 14px 20px; }
  .sms-item {
    padding: 10px 13px; border-radius: 12px; margin-bottom: 10px;
    background: var(--well); border: 1px solid var(--border);
    border-left: 3px solid var(--dim);
  }
  .sms-item.in  { border-left-color: var(--blue); }
  .sms-item.out { border-left-color: var(--ok); }
  .sms-item .head {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono);
  }
  .sms-item.in .dir { color: var(--blue); font-weight: 700; }
  .sms-item.out .dir { color: var(--ok); font-weight: 700; }
  .sms-item .content { font-size: 13.5px; white-space: pre-wrap; word-break: break-word; }
  .sms-item .st.failed, .sms-item .st.error { color: var(--err); }
  .sms-form { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 9px; }
  .sms-form input, .sms-form textarea {
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; padding: 10px 13px; font-size: 14px; resize: vertical;
  }
  .sms-form input:focus, .sms-form textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .sms-form textarea { min-height: 58px; }
  .sms-form .row { display: flex; align-items: center; gap: 10px; }

  /* ========= 历史面板 ========= */
  #page-history .wrap { max-width: 900px; margin: 0 auto; }
  #historyList { padding: 14px 20px; }
  .history-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .history-title .title-main { min-width: 0; }
  .hist-delete { margin-left: 8px; padding: 5px 8px; border-radius: 8px; font-size: 11px; }
  .rec-audio { margin: 4px 0 10px; }
  .rec-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .rec-label { font-size: 12px; color: var(--muted); min-width: 68px; font-family: var(--mono); }
  .rec-row audio { height: 32px; flex: 1; max-width: 320px; }
  .hist-item {
    padding: 12px 14px; border-radius: 13px; margin-bottom: 10px;
    background: var(--well); border: 1px solid var(--border); cursor: pointer;
    transition: border-color .14s, transform .12s;
  }
  .hist-item:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .hist-item.open { border-color: rgba(10, 132, 255, .4); }
  .hist-item .head {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 11.5px; color: var(--muted); font-family: var(--mono);
  }
  .hist-item .num { font-size: 15.5px; font-weight: 700; color: var(--text); }
  .hist-item .dir.in  { color: var(--blue); }
  .hist-item .dir.out { color: var(--ok); }
  .hist-item .st.completed { color: var(--ok); }
  .hist-item .st.failed, .hist-item .st.not_connected { color: var(--err); }
  .hist-item .sum {
    font-size: 12.5px; color: var(--muted); margin-top: 7px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
    border-left: 2px solid rgba(10, 132, 255, .4); padding-left: 10px;
  }
  .hist-item .sum-source { margin-top: 7px; font-size: 11px; font-weight: 700; color: var(--warn); }
  .hist-item .sum-source.verified { color: var(--ok); }
  .timeline { display: none; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 8px; }
  .hist-item.open .timeline { display: block; }
  .tl-row { display: flex; gap: 10px; font-size: 11.5px; color: var(--muted); padding: 2.5px 0; font-family: var(--mono); }
  .tl-row .t  { color: var(--blue); min-width: 64px; flex-shrink: 0; }
  .tl-row .ty { color: var(--text); min-width: 88px; flex-shrink: 0; font-family: inherit; }
  .tl-row .detail { white-space: pre-wrap; word-break: break-word; }

  /* ========= 设置面板 ========= */
  #page-settings .wrap { max-width: 760px; margin: 0 auto; }
  #configForm { padding: 4px 20px 12px; }
  .cfg-group { margin-top: 16px; }
  .cfg-group > .gname {
    font-size: 11.5px; color: var(--blue); letter-spacing: .16em; font-weight: 700;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .cfg-row {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, .04);
  }
  .cfg-row > label:not(.switch) { font-size: 13.5px; flex: 1; }
  .cfg-row label.switch { flex: 0 0 48px; }
  .cfg-row .key { display: block; font-size: 10px; color: var(--dim); font-family: var(--mono); }
  .cfg-row .cfg-note {
    display: block; max-width: 430px; margin-top: 4px; color: var(--muted);
    font-size: 11px; line-height: 1.45; overflow-wrap: anywhere;
  }
  .tag-restart { font-size: 10px; color: var(--warn); margin-left: 6px; }
  .cfg-row input[type=text], .cfg-row input[type=password], .cfg-row input[type=number], .cfg-row select {
    width: 200px; background: var(--well); border: 1px solid var(--border);
    color: var(--text); border-radius: 9px; padding: 7px 10px; font-size: 13px; font-family: var(--mono);
  }
  .cfg-row input[type=number] { color-scheme: dark; }  /* 步进箭头也用深色 */
  .cfg-row input:disabled, .cfg-row select:disabled { opacity: .4; }
  .tag-secret {
    font-size: 11px; padding: 3px 12px; border-radius: 999px;
    background: var(--well); border: 1px solid var(--border); color: var(--muted);
  }
  .tag-secret.set { color: var(--ok); border-color: rgba(48, 209, 88, .4); }
  /* iOS 拟物开关（poc 语言：绿色+回弹） */
  .switch { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .knob {
    position: absolute; inset: 0; border-radius: 999px; cursor: pointer;
    background: rgba(120, 120, 128, .32); transition: background .2s;
  }
  .switch .knob::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 24px; height: 24px;
    border-radius: 50%; background: #fff;
    box-shadow: 0 2px 6px rgba(0, 0, 0, .35);
    transition: transform .25s cubic-bezier(.3, 1.4, .6, 1);
  }
  .switch input:checked + .knob { background: #34c759; }
  .switch input:checked + .knob::after { transform: translateX(20px); }
  .switch input:disabled + .knob { opacity: .4; cursor: default; }
  .cfg-save { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }

  /* ========= 预设任务库管理 ========= */
  #page-profiles .wrap { max-width: 1180px; margin: 0 auto; }
  .profile-head { display: flex; align-items: center; gap: 12px; }
  .profile-head .sub { margin-left: 0; }
  .profile-head .profile-head-spacer { flex: 1; }
  .profile-global { display: inline-flex; align-items: center; gap: 9px; color: var(--muted); font-size: 12px; }
  .profile-grid { display: grid; grid-template-columns: minmax(260px, .8fr) minmax(0, 1.5fr); min-height: 560px; }
  .profile-sidebar { border-right: 1px solid var(--border); min-width: 0; }
  .profile-toolbar { padding: 14px; border-bottom: 1px solid var(--border); }
  .profile-toolbar input {
    width: 100%; background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 9px; padding: 9px 11px; font-size: 13px;
  }
  .profile-toolbar input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .profile-list { max-height: calc(100vh - 270px); overflow-y: auto; padding: 8px; }
  .profile-row { display: flex; align-items: stretch; gap: 4px; margin-bottom: 4px; }
  .profile-row-main {
    min-width: 0; flex: 1; border: 1px solid transparent; border-radius: 8px; padding: 9px 10px;
    background: transparent; color: var(--text); text-align: left; cursor: pointer;
  }
  .profile-row-main:hover { background: var(--well); }
  .profile-row.active .profile-row-main { background: var(--blue-dim); border-color: rgba(10,132,255,.38); }
  .profile-row-title { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .profile-row-title b { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13.5px; }
  .profile-status-dot { width: 7px; height: 7px; flex: 0 0 7px; border-radius: 50%; background: var(--ok); }
  .profile-status-dot.off { background: var(--dim); }
  .profile-row-sub { margin: 3px 0 0 15px; color: var(--muted); font-family: var(--mono); font-size: 10.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-copy {
    width: 34px; flex: 0 0 34px; border: 0; border-radius: 8px; background: transparent;
    color: var(--muted); cursor: pointer; font-size: 17px;
  }
  .profile-copy:hover { color: var(--text); background: var(--well); }
  .profile-editor { min-width: 0; padding: 18px 20px; }
  .profile-editor-empty { color: var(--dim); text-align: center; padding: 90px 20px; }
  .profile-form[hidden], .profile-editor-empty[hidden] { display: none; }
  .profile-form-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .profile-form-title h3 { margin: 0; font-size: 15px; }
  .profile-topline { display: grid; grid-template-columns: minmax(180px, 1fr) auto auto; gap: 14px; align-items: end; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .profile-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .profile-field > label, .profile-switch-label { color: var(--muted); font-size: 11.5px; font-weight: 700; }
  .profile-field input, .profile-field textarea {
    width: 100%; background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 9px; padding: 9px 11px; font-size: 13px;
  }
  .profile-field textarea { min-height: 92px; resize: vertical; line-height: 1.5; }
  .profile-field input:focus, .profile-field textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .profile-field input:disabled { opacity: .42; }
  .profile-segments { display: flex; width: 210px; padding: 3px; border-radius: 9px; background: var(--well); border: 1px solid var(--border); }
  .profile-segments button { flex: 1; border: 0; border-radius: 6px; padding: 7px 9px; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 700; }
  .profile-segments button[aria-pressed="true"] { background: var(--blue-dim); color: var(--blue); }
  .profile-enabled-field { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
  .profile-languages { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; margin-top: 16px; }
  .profile-language { min-width: 0; border: 0; padding: 0; margin: 0; }
  .profile-language legend { color: var(--blue); font-size: 11px; font-weight: 800; letter-spacing: .12em; margin-bottom: 10px; }
  .profile-language .profile-field { margin-bottom: 12px; }
  .profile-count { align-self: flex-end; color: var(--dim); font-family: var(--mono); font-size: 10px; }
  .profile-actions { display: flex; align-items: center; gap: 9px; padding-top: 14px; border-top: 1px solid var(--border); }
  .profile-actions .spacer { flex: 1; }
  .profile-toast { min-height: 18px; margin: 10px 0 0; }
  @media (max-width: 900px) {
    .profile-grid { grid-template-columns: 1fr; }
    .profile-sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
    .profile-list { max-height: 220px; }
    .profile-topline { grid-template-columns: 1fr; align-items: stretch; }
    .profile-enabled-field { align-items: flex-start; }
    .profile-languages { grid-template-columns: 1fr; gap: 8px; }
  }
  @media (max-width: 720px) {
    .dock { max-width: calc(100vw - 16px); overflow-x: auto; }
    .dock button { width: 68px; flex: 0 0 68px; }
    .cfg-row { align-items: stretch; flex-direction: column; gap: 8px; }
    .cfg-row label.switch { align-self: flex-start; }
    .cfg-row input[type=text], .cfg-row input[type=password],
    .cfg-row input[type=number], .cfg-row select { width: 100%; }
    .profile-head { flex-wrap: wrap; }
    .profile-head .profile-head-spacer { display: none; }
    .profile-editor { padding: 16px; }
  }

  /* ========= 底部胶囊 dock（poc 招牌）========= */
  .dock {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 30;
    display: flex; gap: 4px; padding: 7px;
    background: rgba(18, 24, 35, .82);
    border: 1px solid var(--border-strong); border-radius: 26px;
    backdrop-filter: blur(22px) saturate(1.5);
    box-shadow: 0 20px 50px rgba(0, 0, 0, .55), 0 4px 16px rgba(10, 132, 255, .1),
      inset 0 1px 0 rgba(255, 255, 255, .08);
  }
  .dock button {
    width: 84px; height: 58px; border: none; border-radius: 19px; cursor: pointer;
    background: transparent; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    font-size: 11.5px; font-weight: 600;
    transition: background .18s, color .18s, transform .18s;
  }
  .dock button .ico { font-size: 18px; line-height: 1; }
  .dock button:hover { color: var(--text); background: rgba(255, 255, 255, .05); transform: translateY(-2px); }
  .dock button.active {
    color: #fff; background: var(--grad-blue);
    box-shadow: 0 4px 18px rgba(10, 132, 255, .5), inset 0 1px 0 rgba(255, 255, 255, .25);
  }
  /* dock 上的 live 红点提示（通话中且不在对话面板时） */
  .dock button .dot {
    position: absolute; margin-top: -26px; margin-left: 42px;
    width: 9px; height: 9px; border-radius: 50%; background: var(--ok);
    box-shadow: 0 0 8px var(--ok); display: none;
  }
  .dock button.notify .dot { display: block; animation: breathe 1.2s infinite; }

  /* ========= DTMF 键盘浮层 ========= */
  .keypad {
    display: none; position: fixed; right: 26px; top: 66px; z-index: 40;
    background: rgba(18, 24, 35, .95); border: 1px solid var(--border-strong);
    border-radius: 16px; padding: 13px;
    backdrop-filter: blur(20px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, .6);
  }
  .keypad.show { display: block; }
  .keypad .keys { display: grid; grid-template-columns: repeat(3, 58px); gap: 8px; }
  .keypad .keys button {
    height: 46px; font-family: var(--mono); font-size: 18px; font-weight: 700;
    background: var(--well); border: 1px solid var(--border); color: var(--text);
    border-radius: 11px; cursor: pointer; transition: all .12s;
  }
  .keypad .keys button:hover { border-color: var(--blue); color: var(--blue); }
  .keypad .keys button:active { background: var(--blue-dim); }
  .keypad .sent {
    margin-top: 9px; font-family: var(--mono); font-size: 12px; color: var(--ok);
    min-height: 15px; letter-spacing: .22em; text-align: center;
  }

  /* ========= 模态确认框（自定义，替代原生 confirm）========= */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: radial-gradient(120% 120% at 50% 0%, rgba(10,20,30,.62), rgba(4,6,10,.82));
    backdrop-filter: blur(10px) saturate(1.15);
    animation: modal-fade .18s ease-out;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    position: relative; width: min(92vw, 400px); overflow: hidden;
    background: linear-gradient(165deg, rgba(34,42,58,.96), rgba(15,20,30,.97));
    border: 1px solid var(--border-strong); border-radius: 22px;
    padding: 30px 26px 22px; text-align: center;
    box-shadow: 0 28px 70px rgba(0,0,0,.62), inset 0 1px 0 rgba(255,255,255,.06);
    animation: modal-pop .24s cubic-bezier(.2,.9,.3,1.1);
  }
  /* 顶部一道磷光科技感高光 */
  .modal-card::before {
    content: ""; position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--ok), transparent);
    opacity: .8;
  }
  .modal-icon {
    width: 54px; height: 54px; margin: 0 auto 16px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    background: var(--warn-dim); border: 1px solid rgba(255,214,10,.32);
    box-shadow: 0 0 24px rgba(255,214,10,.18), inset 0 0 12px rgba(255,214,10,.1);
  }
  .modal-icon svg { width: 26px; height: 26px; stroke: var(--warn); }
  .modal-icon.danger {
    background: var(--err-dim); border-color: rgba(255,69,58,.34);
    box-shadow: 0 0 24px rgba(255,69,58,.2), inset 0 0 12px rgba(255,69,58,.1);
  }
  .modal-icon.danger svg { stroke: var(--err); }
  .modal-card.danger::before { background: linear-gradient(90deg, transparent, var(--err), transparent); }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: .01em; }
  .modal-msg {
    margin: 10px auto 22px; max-width: 300px;
    font-size: 13.5px; line-height: 1.65; color: var(--muted);
  }
  .modal-actions { display: flex; flex-direction: column; gap: 9px; }
  .modal-actions .btn { width: 100%; padding: 12px 18px; }
  .btn.save {
    background: var(--grad-green); color: #fff;
    box-shadow: 0 2px 16px rgba(48,209,88,.38), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .btn.save:hover { filter: brightness(1.1); box-shadow: 0 2px 22px rgba(48,209,88,.55); }
  @keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modal-pop {
    from { opacity: 0; transform: translateY(10px) scale(.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* 重启过场转圈（磷光绿） */
  .spinner {
    width: 46px; height: 46px; margin: 4px auto 18px; border-radius: 50%;
    border: 3px solid rgba(48,209,88,.18); border-top-color: var(--ok);
    animation: spin .8s linear infinite;
    box-shadow: 0 0 22px rgba(48,209,88,.22);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ========= 首次启动向导 ========= */
  .setup-overlay {
    position: fixed; inset: 0; z-index: 110; display: none;
    align-items: center; justify-content: center; padding: 22px;
    background: radial-gradient(110% 120% at 50% 0%, rgba(10, 20, 30, .68), rgba(4, 6, 10, .88));
    backdrop-filter: blur(12px) saturate(1.18);
  }
  .setup-overlay.show { display: flex; }
  .setup-card {
    width: min(94vw, 760px); max-height: min(88vh, 760px); overflow: hidden;
    background: linear-gradient(165deg, rgba(34,42,58,.96), rgba(15,20,30,.98));
    border: 1px solid var(--border-strong); border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,.66), inset 0 1px 0 rgba(255,255,255,.06);
    display: flex; flex-direction: column;
  }
  .setup-head {
    padding: 20px 24px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .setup-kicker { font-size: 11px; letter-spacing: .18em; color: var(--ok); font-weight: 800; }
  .setup-head h2 { margin: 4px 0 2px; font-size: 22px; line-height: 1.2; }
  .setup-head p { margin: 0; color: var(--muted); font-size: 13px; }
  .setup-steps {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
  }
  .setup-step {
    min-width: 0; border: 1px solid var(--border); border-radius: 10px; padding: 8px 9px;
    background: var(--well); color: var(--muted); font-size: 11px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .setup-step.active { color: #fff; border-color: rgba(10,132,255,.55); background: var(--blue-dim); }
  .setup-body { padding: 20px 24px 8px; overflow-y: auto; }
  .setup-pane { display: none; min-height: 260px; }
  .setup-pane.active { display: block; animation: fadein .18s ease; }
  .setup-pane h3 { margin: 0 0 8px; font-size: 16px; }
  .setup-pane .hint { color: var(--muted); font-size: 13px; margin: 0 0 14px; line-height: 1.6; }
  .setup-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .setup-field { display: flex; flex-direction: column; gap: 6px; }
  .setup-field label { color: var(--muted); font-size: 12px; font-weight: 700; }
  .setup-field input, .setup-field select, .setup-field textarea {
    width: 100%; background: var(--well); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 14px;
  }
  .setup-field textarea { min-height: 74px; resize: vertical; }
  .setup-field input:focus, .setup-field select:focus, .setup-field textarea:focus {
    outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim);
  }
  .recording-choice { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .recording-choice label { position: relative; cursor: pointer; }
  .recording-choice input { position: absolute; opacity: 0; pointer-events: none; }
  .recording-choice span {
    display: flex; align-items: center; justify-content: center; min-height: 44px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--well);
    color: var(--muted); font-size: 14px; font-weight: 700;
  }
  .recording-choice input:checked + span { color: #fff; border-color: var(--blue); background: var(--blue-dim); }
  .recording-choice input:focus-visible + span { outline: 2px solid var(--blue); outline-offset: 2px; }
  .setup-key-help {
    margin-top: 12px; padding: 10px 12px; border-radius: 10px;
    background: var(--well); border: 1px solid var(--border);
    color: var(--muted); font-size: 13px; line-height: 1.55;
  }
  .setup-key-help[hidden] { display: none; }
  .setup-key-help a { color: var(--blue); text-decoration: none; font-weight: 700; }
  .setup-key-help a:hover { text-decoration: underline; }
  .setup-status {
    margin-top: 12px; padding: 11px 12px; border-radius: 12px;
    background: var(--well); border: 1px solid var(--border); color: var(--muted); font-size: 13px;
  }
  .setup-status.ok { color: var(--ok); border-color: rgba(48,209,88,.36); background: var(--ok-dim); }
  .setup-status.err { color: var(--err); border-color: rgba(255,69,58,.36); background: var(--err-dim); }
  .setup-actions {
    padding: 14px 24px 20px; display: flex; gap: 10px; justify-content: flex-end;
    border-top: 1px solid var(--border);
  }
  .setup-actions .left { margin-right: auto; }
  .setup-summary {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px;
  }
  .setup-summary .line {
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px;
    background: var(--well); color: var(--muted); font-size: 12px; overflow-wrap: anywhere;
  }
  .setup-summary b { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }
  @media (max-width: 720px) {
    .setup-card { width: 100%; max-height: 92vh; }
    .setup-head { padding: 16px 16px 12px; }
    .setup-steps { grid-template-columns: repeat(3, 1fr); padding: 10px 12px; }
    .setup-body { padding: 16px; }
    .setup-grid, .setup-summary { grid-template-columns: 1fr; }
    .recording-choice { grid-template-columns: 1fr; }
    .setup-actions { padding: 12px 16px 16px; flex-wrap: wrap; }
    .setup-actions .btn { flex: 1; min-width: 120px; }
  }

  /* ========= 语言选择菜单 ========= */
  #langBtn { display: inline-flex; align-items: center; gap: 5px; }
  #langBtn svg { display: block; }
  .lang-menu {
    display: none; position: fixed; z-index: 50;
    min-width: 132px; padding: 6px;
    background: rgba(18, 24, 35, .95); border: 1px solid var(--border-strong);
    border-radius: 12px; backdrop-filter: blur(20px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, .6);
  }
  .lang-menu.show { display: block; }
  .lang-menu button {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 8px 11px; border: 0; border-radius: 8px;
    background: none; color: var(--text); font-size: 13px; cursor: pointer;
    transition: background .12s;
  }
  .lang-menu button:hover { background: var(--blue-dim); }
  .lang-menu button .check { color: var(--blue); font-weight: 700; }
</style>

  <header>
    <div class="logo"><svg width="100%" height="100%" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CallPilot"><defs><filter id="cpGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="0.9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect x="0.5" y="0.5" width="27" height="27" rx="7" fill="#0a0e16" stroke="#1c2740" stroke-width="1"/><g filter="url(#cpGlow)" stroke="#43e69a" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9.4 8.2c-.5-.5-1.3-.5-1.7.1-.7 1-1 2.2-.5 3.6.9 2.6 3 4.7 5.6 5.6 1.4.5 2.6.2 3.6-.5.6-.4.6-1.2.1-1.7l-1.7-1.7c-.4-.4-1-.4-1.4-.1l-.7.5c-1-.6-1.9-1.5-2.5-2.5l.5-.7c.3-.4.3-1-.1-1.4z"/><path d="M17.4 6.6c1.1.3 2 1.2 2.3 2.3" opacity="0.95"/><path d="M17.8 4.1c2 .5 3.6 2.1 4.1 4.1" opacity="0.6"/></g></svg></div>

/* ========= 全局通话状态 ========= */
let callActive = false;
let callStatus = "idle";
let backTimer = null;
// 通话计时：answered 起走表，直观感知通话进行中与时长（每秒刷新状态文本）。
let callTimerId = null;
let callAnsweredAt = 0;
function _fmtCallDur(ms) {
  const total = Math.floor(ms / 1000);
  const m = String(Math.floor(total / 60)).padStart(2, "0");
  const s = String(total % 60).padStart(2, "0");
  return `${m}:${s}`;
}
function _renderStateText(status) {
  let label = t("st_" + status) !== "st_" + status ? t("st_" + status) : status;
  if (status === "answered" && callAnsweredAt) {
    label += ` ${_fmtCallDur(Date.now() - callAnsweredAt)}`;
  }
  $("stateText").textContent = label;
}
function setCall(status, caller) {
  const chip = $("stateChip");
  const wasActive = callActive;  // 上一状态（用于识别「新通话开始」这一跳变）
  callStatus = status;
  chip.className = "state-chip " + status;
  if (status === "answered") {
    if (!callTimerId) {
      callAnsweredAt = Date.now();
      callTimerId = setInterval(() => _renderStateText(callStatus), 1000);
    }
  } else if (callTimerId) {
    clearInterval(callTimerId);
    callTimerId = null;
    callAnsweredAt = 0;
  }
  _renderStateText(status);
  $("stateNum").textContent = status === "idle" ? "" : (caller || "");
  callActive = (status === "ringing" || status === "dialing" || status === "answered");
  // 从空闲跳到活跃 = 一通新通话开始：在实时转写里插入分割线（与上一通隔开）
  if (callActive && !wasActive) insertCallDivider(caller);
  $("quickActs").classList.toggle("show", callActive);
  $("liveTag").style.display = callActive ? "inline-flex" : "none";
  $("liveSub").textContent = callActive ? (caller || "") : t("live_sub_idle");
  syncRecordingUi();
  if (!callActive) { $("keypad").classList.remove("show"); $("dtmfSent").textContent = ""; }

  if (callActive) {
    clearTimeout(backTimer);
    // 通话开始：自动切到对话面板（poc 行为）
    if (currentPage !== "live") switchPage("live");
  } else if (status === "ended" && currentPage === "live") {
    // 结束后 4s 自动回电话主页
    clearTimeout(backTimer);
    backTimer = setTimeout(() => { if (!callActive) switchPage("phone"); }, 4000);
  }
}

/* ========= 实时旁听：Web Audio 播放下行 PCM（走浏览器→系统音频，绕开 native）========= */
// 下行(AI)与上行(对方)各一条播放时间线，按帧首字节的方向标记分流，两路同时出声。
let audioWs = null, audioCtx = null, audioResumePending = false;
const listenRate = {0: 24000, 1: 8000};   // 0=下行 1=上行
const listenNextAt = {0: 0, 1: 0};
async function ensureListenAudioRunning() {
  if (!audioCtx) return false;
  if (audioCtx.state === "running") return true;
  try { await audioCtx.resume(); }
  catch (e) { console.warn("[listen] AudioContext 恢复失败", e); return false; }
  return audioCtx.state === "running";
}
async function toggleListen() {
  if (audioWs || audioCtx) { stopListen(); return; }
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch (e) { console.warn("[listen] AudioContext 不可用", e); return; }
  if (!(await ensureListenAudioRunning())) { stopListen(); return; }
  listenNextAt[0] = 0; listenNextAt[1] = 0;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  audioWs = new WebSocket(`${proto}://${location.host}/ws/audio`);
  audioWs.binaryType = "arraybuffer";
  audioWs.onmessage = (e) => {
    if (typeof e.data === "string") {
      try {
        const m = JSON.parse(e.data);
        if (m.rate) listenRate[0] = m.rate;
        if (m.uplink_rate) listenRate[1] = m.uplink_rate;
      } catch (_) {}
      return;
    }
    const kind = new Uint8Array(e.data, 0, 1)[0];        // 首字节：方向
    const int16 = new Int16Array(e.data.slice(1));       // 其余：s16le PCM
    if (!audioCtx || audioCtx.state !== "running") {
      void resumeAndPlayPcm(int16, kind);
      return;
    }
    playPcm(int16, kind);
  };
  audioWs.onclose = () => { if (audioWs) stopListen(); };
  const btn = $("listenBtn");
  btn.classList.add("on"); btn.textContent = t("listen_on");
}
async function resumeAndPlayPcm(int16, kind) {
  if (audioResumePending) return;
  audioResumePending = true;
  const context = audioCtx;
  try {
    if (!(await ensureListenAudioRunning()) || audioCtx !== context) {
      if (audioCtx === context) stopListen();
      return;
    }
    listenNextAt[kind] = 0;
    playPcm(int16, kind);
  } finally {
    audioResumePending = false;
  }
}
function playPcm(int16, kind) {
  if (!audioCtx || !int16.length) return;
  const rate = listenRate[kind] || 24000;
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
  const buf = audioCtx.createBuffer(1, f32.length, rate);
  buf.copyToChannel(f32, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (listenNextAt[kind] < now) listenNextAt[kind] = now + 0.08;  // 抖动缓冲，防爆音
  src.start(listenNextAt[kind]);
  listenNextAt[kind] += buf.duration;
}
function stopListen() {
  audioResumePending = false;
  if (audioWs) { try { audioWs.onclose = null; audioWs.close(); } catch (_) {} audioWs = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (_) {} audioCtx = null; }
  const btn = $("listenBtn");
  btn.classList.remove("on"); btn.textContent = t("listen_off");
}
$("listenBtn").addEventListener("click", toggleListen);

let managedProfiles = [];
let profileDirty = false;
let profileMatchMode = "exact";

function profileLangValue(profile, field, lang = LANG) {
  const value = profile && profile[field];
  if (typeof value === "string") return value;
  if (!value || typeof value !== "object") return "";
  return String(value[lang] || value[lang === "zh" ? "en" : "zh"] || "");
}

function profileExactLangValue(profile, field, lang) {
  const value = profile && profile[field];
  if (typeof value === "string") return value;
  if (!value || typeof value !== "object") return "";
  return String(value[lang] || "");
}

function blankManagedProfile() {
  const blank = { zh: "", en: "" };
  return {
    id: "", enabled: true, number: "", match_mode: "exact",
    label: { ...blank }, task: { ...blank }, scenario: { ...blank }, opening: { ...blank },
    opening_mode: "say", dtmf_spoken_followup: false, result_verification: "none",
  };
}

function renderProfileList() {
  const list = $("profileList");
  if (!list) return;
  const query = $("profileSearch").value.trim().toLowerCase();
  const selectedId = $("profileId").value;
  list.textContent = "";
  const matches = managedProfiles.filter((profile) => {
    const haystack = [
      profile.number,
      profileLangValue(profile, "label", "zh"), profileLangValue(profile, "label", "en"),
      profileLangValue(profile, "task", "zh"), profileLangValue(profile, "task", "en"),
    ].join(" ").toLowerCase();
    return !query || haystack.includes(query);
  });
  if (!matches.length) {
    list.appendChild(el("div", "empty", t("profile_no_match")));
    return;
  }
  for (const profile of matches) {
    const row = el("div", "profile-row" + (profile.id === selectedId ? " active" : ""));
    const main = el("button", "profile-row-main");
    main.type = "button";
    const title = el("div", "profile-row-title");
    title.appendChild(el("span", "profile-status-dot" + (profile.enabled ? "" : " off")));
    title.appendChild(el("b", "", profileLangValue(profile, "label") || profile.number));
    main.appendChild(title);
    const task = profile.match_mode === "number" ? t("profile_number_default") : profileLangValue(profile, "task");
    main.appendChild(el("div", "profile-row-sub", `${profile.number}${task ? " · " + task : ""}`));
    main.addEventListener("click", async () => {
      if (profile.id === $("profileId").value) return;
      if (await confirmProfileDiscardChanges()) openProfileEditor(profile);
    });
    row.appendChild(main);
    const copy = el("button", "profile-copy", "⧉");
    copy.type = "button";
    copy.title = t("profile_duplicate");
    copy.setAttribute("aria-label", t("profile_duplicate"));
    copy.addEventListener("click", async () => {
      if (await confirmProfileDiscardChanges()) duplicateProfile(profile);
    });
    row.appendChild(copy);
    list.appendChild(row);
  }
}

function duplicateProfile(profile) {
  const copy = JSON.parse(JSON.stringify(profile));
  copy.id = "";
  for (const lang of ["zh", "en"]) {
    const label = String((copy.label || {})[lang] || "");
    const suffix = I18N[lang].profile_copy_suffix || t("profile_copy_suffix");
    if (label) copy.label[lang] = label + suffix;
  }
  openProfileEditor(copy);
  profileDirty = true;
  renderProfileList();
}

async function loadManagedProfiles(selectId = null) {
  try {
    const response = await fetch("/api/number_profiles/manage");
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    managedProfiles = Array.isArray(data.profiles) ? data.profiles : [];
    $("profilesEnabled").checked = !!data.enabled;
    const targetId = selectId || (!profileDirty ? $("profileId").value : "");
    const selected = managedProfiles.find((profile) => profile.id === targetId);
    if (selected && !profileDirty) openProfileEditor(selected);
    else renderProfileList();
  } catch (error) {
    console.warn("[profiles] 加载管理数据失败", error);
    managedProfiles = [];
    renderProfileList();
  }
}

function validateProfileForm(profile) {
  if (!/^\+?[0-9*#]{1,32}$/.test(profile.number)) return t("profile_need_number");
  if (!profile.scenario.zh && !profile.scenario.en) return t("profile_need_scenario");
  if (profile.match_mode === "exact" && !profile.task.zh && !profile.task.en) return t("profile_need_task");
  return "";
}

let dialProfiles = [];
let dialPresetHint = null;  // 选中预设的命中键（预设原任务）；改号码或选自定义时清空，改事项不清
let dialPresetId = null;    // 稳定身份：任务库改名或本通事项细化后仍命中原预设
function renderDialPresets() {
  const select = $("dialPreset");
  const current = select.value;
  select.textContent = "";
  select.appendChild(new Option(t("preset_custom"), ""));
  dialProfiles.forEach((profile, index) => {
    const label = String(profile.label || profile.task || profile.number || "");
    select.appendChild(new Option(label, String(profile.id || index)));
  });
  select.value = [...select.options].some((option) => option.value === current) ? current : "";
  if (!select.value) { dialPresetHint = null; dialPresetId = null; }
}
async function loadDialPresets() {
  try {
    const r = await fetch(`/api/number_profiles?lang=${encodeURIComponent(LANG)}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    dialProfiles = Array.isArray(data.profiles) ? data.profiles.filter((profile) => profile && profile.number) : [];
  } catch (e) {
    console.warn("[profiles] 加载预设任务失败", e);
    dialProfiles = [];
  }
  renderDialPresets();
}
function applyDialPreset() {
  const value = $("dialPreset").value;
  if (value === "") { dialPresetHint = null; dialPresetId = null; return; }
  const profile = dialProfiles.find((item) => String(item.id || "") === value) || dialProfiles[Number(value)];
  if (!profile) { dialPresetHint = null; dialPresetId = null; return; }
  dialPresetHint = String(profile.task || "");  // 命中键：预设原任务（通配预设为空串）
  dialPresetId = profile.id ? String(profile.id) : null;
  $("dialNumber").value = String(profile.number || "");
  $("dialTask").value = String(profile.task || "");
}
$("dialPreset").addEventListener("change", applyDialPreset);

async function doDial() {
  const number = $("dialNumber").value.trim();

  const btn = $("dialBtn");
  btn.disabled = true; setToast("dialToast", "", t("calling"));
  try {
    const { res } = await postJson("/api/call/dial", { number, task: task || null, preset_task: dialPresetHint, preset_id: dialPresetId });
    if (res.ok) {
      setToast("dialToast", "ok", t("call_sent"));
      if (task) $("dialTask").value = "";
    } else setToast("dialToast", "err", res.error || t("call_fail"));

  finally { btn.disabled = false; }

async function loadRemoteCloudStatus() {
  const disabled = { enabled: false, enrolled: false, connected: false };

    const response = await fetch("/api/remote_cloud/status", { cache: "no-store" });
    if (!response.ok) return disabled;
    const status = await response.json();
    $("remoteCloudPanel").classList.toggle("show", Boolean(status.enabled && !status.enrolled));
    if (status.enabled) {
      $("remoteCloudStatus").textContent = !status.enrolled
        ? t("remote_cloud_not_enrolled")
        : (status.connected ? t("remote_cloud_connected") : t("remote_cloud_connecting"));

    return status;
  } catch (e) {
    return disabled;
  }
}

/* ========= 历史 + 最近通话 ========= */
const dirText = () => ({ inbound: t("dir_in"), outbound: t("dir_out") });
const statusText = () => ({ completed: t("stc_completed"), failed: t("stc_failed"), not_connected: t("stc_not_connected") });
const openCalls = new Set();
let historyCache = [];

function evTypeText(ev) {
  const m = t("ev");
  if (ev.type === "transcript") return ev.role === "user" ? m.transcript_user : m.transcript_agent;
  return m[ev.type] || ev.type;
}
function evDetail(ev) {
  if (ev.type === "transcript") return ev.text || "";
  if (ev.type === "latency") return `${ev.stage || ""} ${Math.round(ev.ms || 0)}ms`;
  if (ev.type === "call_finished") return statusText()[ev.status] || ev.status || "";
  if (ev.type === "dialing") return ev.number || "";
  if (ev.type === "dtmf") return ev.digits || "";
  return "";
}
function buildRecPlayers(id) {
  // 单条合成对话录音（立体声 左=AI / 右=对方）。走浏览器 <audio>（Chrome→系统音频），
  // 绕开本机 PortAudio/ffmpeg 播放问题。
  const box = el("div", "rec-audio");
  box.addEventListener("click", (event) => event.stopPropagation());
  const row = el("div", "rec-row");
  row.addEventListener("click", (event) => event.stopPropagation());
  row.appendChild(el("span", "rec-label", t("rec_conversation")));
  const a = document.createElement("audio");
  a.controls = true;
  a.preload = "none";
  a.src = `/api/history/${encodeURIComponent(id)}/audio/mixed`;
  a.addEventListener("click", (event) => event.stopPropagation());
  row.appendChild(a);
  box.appendChild(row);
  return box;
}
async function loadTimeline(tl, id) {
  try {
    const r = await fetch(`/api/history/${encodeURIComponent(id)}/events`);
    if (!r.ok) return;
    const events = await r.json();
    tl.textContent = "";
    tl.appendChild(buildRecPlayers(id));
    for (const ev of events) {
      const row = el("div", "tl-row");
      row.appendChild(el("span", "t", ev.ts ? fmtTime(ev.ts) : ""));
      row.appendChild(el("span", "ty", evTypeText(ev)));
      row.appendChild(el("span", "detail", evDetail(ev)));
      tl.appendChild(row);
    }
    tl.dataset.loaded = "1";
  } catch (e) { console.warn("[history] 加载通话时间线失败", e); }
}
async function toggleHistItem(item, id) {
  if (item.classList.contains("open")) { item.classList.remove("open"); openCalls.delete(id); return; }
  const tl = item.querySelector(".timeline");
  if (!tl.dataset.loaded) await loadTimeline(tl, id);
  item.classList.add("open"); openCalls.add(id);
}
async function fetchHistory() {
  const r = await fetch("/api/history?limit=50");
  if (!r.ok) return [];
  historyCache = await r.json();
  return historyCache;
}
async function loadHistory() {
  try {
    const calls = await fetchHistory();
    const list = $("historyList");
    list.textContent = "";
    if (!calls.length) { list.appendChild(el("div", "empty", t("empty_history"))); return; }
    for (const c of calls) {
      const item = el("div", "hist-item");
      const head1 = el("div", "head");
      head1.appendChild(el("span", "num", c.number || t("unknown_number")));
      const right = el("span");
      right.appendChild(el("span", "dir " + (c.direction === "inbound" ? "in" : "out"),
        dirText()[c.direction] || c.direction || "?"));
      right.appendChild(document.createTextNode(" "));
      right.appendChild(el("span", "st " + (c.status || ""), statusText()[c.status] || c.status || ""));
      const del = el("button", "btn danger hist-delete", t("hist_delete"));
      del.type = "button";
      del.addEventListener("click", (ev) => {
        ev.stopPropagation();
        deleteHistoryItem(c.id);
      });
      right.appendChild(del);
      head1.appendChild(right);
      item.appendChild(head1);
      const head2 = el("div", "head");
      head2.appendChild(el("span", "", fmtDateTime(c.started_at)));
      item.appendChild(head2);
      const summary = c.summary || {};
      if (summary.result_verification === "verified") {
        item.appendChild(el("div", "sum-source verified", t("summary_verified_sms")));
      } else if (summary.result_verification === "unverified") {
        item.appendChild(el("div", "sum-source", t("summary_unverified")));
      }
      const summaryText = summary.summary || "";
      if (summaryText) item.appendChild(el("div", "sum", summaryText));
      item.appendChild(el("div", "timeline"));
      item.addEventListener("click", () => toggleHistItem(item, c.id));
      list.appendChild(item);
      if (openCalls.has(c.id)) {
        loadTimeline(item.querySelector(".timeline"), c.id);
        item.classList.add("open");
      }
    }
  } catch (e) { console.warn("[history] 加载通话历史失败", e); }
}

async function deleteHistoryItem(id) {
  const choice = await showModal({
    tone: "danger",
    title: t("hist_delete_title"), message: t("hist_delete_msg"),
    actions: [
      { key: "ok", label: t("hist_delete"), kind: "danger" },
      { key: "cancel", label: t("modal_cancel"), kind: "ghost" },
    ],
  });
  if (choice !== "ok") return;
  try {
    const r = await fetch(`/api/history/${encodeURIComponent(id)}`, { method: "DELETE" });
    const res = await r.json();
    if (!r.ok || !res.ok) throw new Error(res.error || "");
    openCalls.delete(id);
    historyCache = [];
    await loadHistory();
    loadRecent();

}

/* 电话主页右列：最近 6 条 */
async function loadRecent() {
  try {
    const calls = historyCache.length ? historyCache : await fetchHistory();
    const list = $("recentList");
    list.textContent = "";
    if (!calls.length) { list.appendChild(el("div", "empty", t("empty_calls"))); return; }
    for (const c of calls.slice(0, 6)) {
      const item = el("div", "recent-item");
      const isIn = c.direction === "inbound";
      item.appendChild(el("div", "ric " + (isIn ? "in" : "out"), isIn ? "↓" : "↑"));
      const main = el("div", "rmain");
      main.appendChild(el("div", "rnum", c.number || t("unknown_number")));
      const sub = (c.summary && c.summary.summary) || statusText()[c.status] || "";

function queueChip(parent, text, cls) {
  parent.appendChild(el("span", "q-num" + (cls ? " " + cls : ""), text));
}
async function refreshQueue() {
  try {
    const r = await fetch("/api/call/queue");
    if (!r.ok) return;
    const q = await r.json();
    const box = $("queueStatus");
    box.textContent = "";
    const statText = q.active
      ? t("q_active")(q.pending.length, (q.done || []).length)
      : ((q.done || []).length ? t("q_done")(q.done.length) : t("q_idle"));
    box.appendChild(el("div", "q-stat", statText));
    if (q.current) queueChip(box, `${q.current}${t("q_current")}`, "cur");
    for (const n of q.pending) queueChip(box, n);
    // 已拨结果汇总表（全量，谁成谁败一目了然；替代原先只显示尾部 10 个的 chips）
    const done = q.done || [];
    if (done.length) {
      const table = el("table", "q-table");
      const head = el("tr");
      for (const key of ["q_th_number", "q_th_result", "q_th_detail"]) {
        head.appendChild(el("th", "", t(key)));
      }
      table.appendChild(head);
      for (const d of done) {
        const row = el("tr");
        row.appendChild(el("td", "", d.number));
        row.appendChild(el("td", d.ok ? "ok" : "fail", d.ok ? "✓ " + t("q_ok") : "✗ " + t("q_fail")));
        row.appendChild(el("td", "", d.error || ""));
        table.appendChild(row);
      }
      box.appendChild(table);
    }
  } catch (e) { console.warn("[queue] 刷新外呼队列失败", e); }
}
$("batchDialBtn").addEventListener("click", async () => {
  const numbers = $("batchNumbers").value
    .split(/[\r\n,，;；]+/).map((s) => s.trim()).filter(Boolean);

  if (!numbers.length) { setToast("batchToast", "err", t("need_number")); return; }
  const choice = await showModal({
    title: t("batch_title"), message: t("batch_msg")(numbers.length),
    actions: [
      { key: "ok", label: t("batch_ok"), kind: "primary" },
      { key: "cancel", label: t("modal_cancel"), kind: "ghost" },
    ],
  });

async function validateSetupKey() {
  const provider = $("setupProvider").value;
  if (provider === "doubao") {
    setupValidated = true;
    setupStatus("setupKeyStatus", "", t("setup_doubao_note"));
    return true;
  }
  const key = $("setupApiKey").value.trim();
  if (!key) {
    setupValidated = false;
    setupStatus("setupKeyStatus", "err", t("setup_need_key"));
    return false;
  }
  setupStatus("setupKeyStatus", "", t("setup_validating"));
  try {
    const { httpOk, res } = await postJson("/api/config/validate_key", { provider, api_key: key });
    setupValidated = !!(httpOk && res.ok);
    const msg = res.status === "valid" ? t("setup_key_valid")
      : res.status === "invalid" ? t("setup_key_invalid")
      : res.status === "network" ? t("setup_key_network")
      : t("setup_key_unsupported");
    setupStatus("setupKeyStatus", setupValidated ? "ok" : "err", msg);
    return setupValidated;
  } catch (e) {
    setupValidated = false;
    setupStatus("setupKeyStatus", "err", t("setup_key_network"));
    return false;
  }
}

async function saveSetupApi() {
  const provider = $("setupProvider").value;
  const updates = { AGENT_PROVIDER: provider };
  if (provider === "doubao") {
    const appId = $("setupDoubaoAppId").value.trim();
    const accessKey = $("setupDoubaoAccessKey").value.trim();
    if (appId) updates.DOUBAO_APP_ID = appId;
    if (accessKey) updates.DOUBAO_ACCESS_KEY = accessKey;
  } else {
    const key = $("setupApiKey").value.trim();
    if (!key) {
      setupStatus("setupKeyStatus", "err", t("setup_need_key"));
      return false;
    }
    if (!setupValidated && !(await validateSetupKey())) return false;
    updates[setupProviderKey(provider)] = key;
  }
  const { httpOk, res } = await postJson("/api/config", updates);
  if (!httpOk) {
    setupStatus("setupKeyStatus", "err", t("cfg_savefail") + (res.error || ""));
    return false;
  }
  setupStatus("setupKeyStatus", "ok", t("setup_key_saved"));
  await loadMeta();
  return true;
}

async function saveSetupRecording() {

async function completeSetup() {
  if (!setupRecordingConfirmed) {
    setupStep = 3;
    renderSetupWizard();
    setupStatus("setupRecordingStatus", "err", t("setup_recording_choose"));
    return;
  }
  if (!setupRecordingSaved && !(await saveSetupRecording())) return;
  const selected = document.querySelector('input[name="setupRecording"]:checked');
  const enabled = selected.value === "true";
  try {
    const { httpOk, res } = await postJson("/api/setup/complete", { recording_enabled: enabled });
    if (!httpOk || !res.ok) {
      setupStatus("setupDoneStatus", "err", t("setup_complete_fail") + (res.error || ""));
      return;
    }
    hideSetupWizard();
    await loadMeta();
    loadConfig();
    switchPage("phone");
  } catch (e) {
    setupStatus("setupDoneStatus", "err", t("setup_complete_fail") + t("req_error"));
  }
}

async function nextSetupStep() {
  $("setupNext").disabled = true;
  try {
    if (setupStep === 1 && !(await saveSetupApi())) return;
    if (setupStep === 2 && !(await saveSetupPersonal())) return;
    if (setupStep === 3 && !(await saveSetupRecording())) return;
    if (setupStep === 5) { await completeSetup(); return; }
    setupStep = Math.min(5, setupStep + 1);
    if (setupStep === 4) await loadMeta();
    renderSetupWizard();
  } finally {
    $("setupNext").disabled = false;
  }
}

const truthy = ["true", "1", "yes"];
const boolChecked = (v) => truthy.includes(String(v).trim().toLowerCase());
function cfgGroup(key) {
  if (/^(OWNER_NAME|AGENT_PERSONA|AGENT_LANGUAGE)$/.test(key)) return t("grp_identity");
  if (/^(AGENT_PROVIDER|QWEN_|OPENAI_|AGENT_MODEL|AGENT_OUTBOUND|DASHSCOPE)/.test(key)) return t("grp_ai");
  if (/^MODEM_/.test(key)) return t("grp_modem");
  if (/^(RECORDING_|SUMMARY_|CALL_LOG|HALF_DUPLEX|HANGUP_)/.test(key)) return t("grp_call");
  if (/^MONITOR_/.test(key)) return t("grp_monitor");
  if (/^(DIAL_|SMS_|REMOTE_|LIVEKIT_)/.test(key)) return t("grp_dial");
  return t("grp_sys");
}
function cfgLabel(c) {
  if (LANG === "en" && I18N.en.cfg[c.key]) return I18N.en.cfg[c.key];
  return c.label;
}
async function loadConfig() {
  try {
    const r = await fetch("/api/config");
    if (!r.ok) return;
    cfgSpecs = await r.json();
    const form = $("configForm");
    form.textContent = "";
    // 固定分组顺序：身份（机主姓名/人设）最靠前——是最关键的个性化项，
    // 不能像以前那样落到兜底的「系统」组、埋在 WEB_PORT 之间。
    const order = [t("grp_identity"), t("grp_ai"), t("grp_modem"),
                   t("grp_call"), t("grp_monitor"), t("grp_dial"), t("grp_sys")];
    const groups = new Map();
    for (const g of order) {
      const wrap = el("div", "cfg-group");
      wrap.appendChild(el("div", "gname", g));
      groups.set(g, wrap);
      form.appendChild(wrap);
    }
    for (const c of cfgSpecs) {
      const g = cfgGroup(c.key);
      const row = el("div", "cfg-row");
      const label = el("label", "", cfgLabel(c));
      if (c.requires_restart) label.appendChild(el("span", "tag-restart", t("tag_restart")));
      label.appendChild(el("span", "key", c.key));
      if (c.key === "SMS_EMAIL_FORWARD_ENABLED") {
        label.appendChild(el("span", "cfg-note", t("sms_email_privacy")));
      }
      if (c.key === "RECORDING_ENABLED") {
        label.appendChild(el("span", "cfg-note", recordingDetailsText()));
      }
      if (c.help && /^https?:\/\//.test(c.help)) {
        const hint = document.createElement("a");
        hint.href = c.help; hint.target = "_blank"; hint.rel = "noopener";
        hint.textContent = t("voice_preview");
        hint.style.cssText = "margin-left:8px;font-size:11px;color:var(--blue);text-decoration:none;";
        label.appendChild(hint);
      }
      row.appendChild(label);

      let ctrl;
      if (c.secret) {
        if (c.editable) {
          ctrl = document.createElement("input");
          ctrl.type = "password";
          ctrl.autocomplete = "off";
          ctrl.spellcheck = false;
          ctrl.placeholder = `${c.value === "已设置" ? t("secret_set") : t("secret_unset")} · ${t("secret_keep")}`;
          ctrl.dataset.key = c.key;
        } else {
          ctrl = el("span", "tag-secret" + (c.value === "已设置" ? " set" : ""), c.value === "已设置" ? t("secret_set") : t("secret_unset"));
        }
        row.appendChild(ctrl);
      } else if (c.kind === "bool") {
        const sw = el("label", "switch");
        ctrl = document.createElement("input");
        ctrl.type = "checkbox";
        ctrl.checked = boolChecked(c.value);
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        sw.appendChild(ctrl);
        sw.appendChild(el("span", "knob"));
        row.appendChild(sw);
      } else if (c.kind === "select") {
        ctrl = document.createElement("select");
        for (const ch of c.choices) {
          const opt = document.createElement("option");
          opt.value = ch; opt.textContent = (c.choice_labels && c.choice_labels[ch]) || ch;
          ctrl.appendChild(opt);
        }
        ctrl.value = c.value;
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        row.appendChild(ctrl);
      } else if (c.kind === "int" || c.kind === "float") {
        // 数值项用 number 输入框：带步进/校验，比自由文本更合适。
        ctrl = document.createElement("input");
        ctrl.type = "number";
        ctrl.step = c.kind === "int" ? "1" : "any";
        if (!/GAIN/.test(c.key)) ctrl.min = "0";  // 增益外的数值均非负
        ctrl.value = c.value;
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        row.appendChild(ctrl);
      } else {
        ctrl = document.createElement("input");
        ctrl.type = "text";
        ctrl.value = c.value;
        ctrl.disabled = !c.editable;
        ctrl.dataset.key = c.key;
        // 音色等「可枚举但会新增」的项：给 datalist 建议但不限制（仍可手打）。
        const suggest = CFG_SUGGEST[c.key];
        if (suggest) {
          const listId = "dl-" + c.key;
          ctrl.setAttribute("list", listId);
          const dl = document.createElement("datalist");
          dl.id = listId;
          for (const opt of suggest) {
            const o = document.createElement("option");
            o.value = opt;
            dl.appendChild(o);
          }
          row.appendChild(dl);
        }
        row.appendChild(ctrl);
      }
      groups.get(g).appendChild(row);
    }
    // 移除没有任何字段的空分组（只剩标题那一个子节点）。
    for (const wrap of groups.values()) {
      if (wrap.childElementCount <= 1) wrap.remove();
    }
    cfgDirty = false;  // 刚从服务端同步，视为无未保存修改
    syncRecordingUi();
  } catch (e) { console.warn("[config] 加载设置面板失败", e); }
}
// 手动重启按钮：确认后重启服务（可从界面重连模组/恢复，无需命令行）。
async function confirmRestart() {
  const choice = await showModal({
    title: t("restart_confirm_title"), message: t("restart_confirm_msg"),
    actions: [
      { key: "ok", label: t("restart_confirm_ok"), kind: "primary" },
      { key: "cancel", label: t("modal_cancel"), kind: "ghost" },
    ],
  });
  if (choice === "ok") restartService();
}
$("restartBtn").addEventListener("click", confirmRestart);   // 设置页按钮
$("restartTop").addEventListener("click", confirmRestart);   // 顶栏图标

// 保存了「需重启」配置后自动重启服务：过场遮罩 + 轮询 /api/meta 复活后自动刷新。
async function restartService() {
  $("restartTitle").textContent = t("restart_title");
  $("restartMsg").textContent = t("restart_msg");
  $("restartOverlay").classList.add("show");
  try { await postJson("/api/restart", {}); } catch (e) { console.warn("[restart] 请求失败", e); }
  const deadline = Date.now() + 40000;
  const poll = async () => {
    try {
      const r = await fetch("/api/meta", { cache: "no-store" });
      if (r.ok) { location.reload(); return; }
    } catch (e) { /* 重启窗口内连接中断属正常 */ }
    if (Date.now() < deadline) setTimeout(poll, 1200);
    else $("restartMsg").textContent = t("restart_timeout");
  };
  setTimeout(poll, 2500);  // 给进程 execv 重启留出时间再开始轮询
}

// 任一字段被改动即标记「脏」（离开页面时据此提示保存）。
$("configForm").addEventListener("input", () => { cfgDirty = true; });
$("configForm").addEventListener("change", () => { cfgDirty = true; });

$("configSave").addEventListener("click", async () => {
  const updates = {};
  for (const c of cfgSpecs) {
    if (!c.editable) continue;
    const ctrl = document.querySelector(`#configForm [data-key="${c.key}"]`);
    if (!ctrl) continue;
    if (c.secret) {
      const val = ctrl.value.trim();
      if (val) updates[c.key] = val;
      continue;
    }
    const val = c.kind === "bool" ? (ctrl.checked ? "true" : "false") : ctrl.value;
    const orig = c.kind === "bool" ? (boolChecked(c.value) ? "true" : "false") : String(c.value);
    if (val !== orig) updates[c.key] = val;
  }
  if (!Object.keys(updates).length) { setToast("configToast", "", t("cfg_nochange")); return; }
  const btn = $("configSave");
  btn.disabled = true; setToast("configToast", "", t("cfg_saving"));
  try {
    const { httpOk, res } = await postJson("/api/config", updates);
    if (httpOk) {
      let msg = t("cfg_saved")(res.updated.length);
      if (res.requires_restart.length) msg += t("cfg_restart")(res.requires_restart.length);
      setToast("configToast", "ok", msg);
      cfgDirty = false;
      // 含「需重启」项且当前无通话：自动重启服务应用（通话中则留待用户手动，不打断）。
      if (res.requires_restart.length && !callActive) restartService();
      else loadConfig();
      loadRemoteDialerStatus();
    } else setToast("configToast", "err", t("cfg_savefail") + (res.error || ""));
  } catch (err) { setToast("configToast", "err", t("req_error")); }
  finally { btn.disabled = false; }
});

/* 语言菜单：数组驱动，新语言在 LANGS 与 I18N 各加一项即可 */
const LANGS = [
  { code: "en", label: "English" },
  { code: "zh", label: "中文" },
];
function renderLangMenu() {
  const menu = $("langMenu");
  menu.textContent = "";
  LANGS.forEach(({ code, label }) => {
    const item = el("button", null, label);
    item.setAttribute("role", "menuitem");
    if (code === LANG) item.appendChild(el("span", "check", "✓"));
    item.addEventListener("click", () => setLang(code));
    menu.appendChild(item);
  });
}
function setLang(code) {
  $("langMenu").classList.remove("show");
  if (code === LANG) return;
  LANG = code;
  localStorage.setItem("cp_lang", LANG);
  applyI18n();
  loadHistory().then(loadRecent);  // 重渲染带翻译的动态列表
  loadConfig();
  refreshQueue();
  loadDialPresets();  // 语言切换后重取预设，label/task 跟随界面语言
}
$("langBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  const menu = $("langMenu");
  const r = $("langBtn").getBoundingClientRect();
  menu.style.top = `${r.bottom + 8}px`;
  menu.style.left = `${Math.max(8, r.right - 132)}px`;
  menu.classList.toggle("show");
});
document.addEventListener("click", (e) => {
  if (!$("langMenu").contains(e.target)) $("langMenu").classList.remove("show");
});
applyI18n();
setModem(false);   // 默认显示模组未连接，连上后由 modem_status 事件翻绿
loadMeta();
connect();
loadHistory().then(loadRecent);
refreshQueue();
loadConfig();
loadDialPresets();
loadRemoteDialerStatus();
setInterval(refreshQueue, 2000);
</script>
</body>
