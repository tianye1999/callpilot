<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src wss:; media-src blob:; worker-src blob:; base-uri 'none'; form-action 'none'">
  <title>CallPilot Remote</title>
  <link rel="stylesheet" href="./remote_dialer.css">
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/livekit-client@2.20.1/dist/livekit-client.umd.min.js"
    integrity="sha384-IGu2q4tt1II4yly/zsJYCCLP+lffK6+KqCYd4wvwv7cEzBcULk1wHM1fKzBOLrqY"
    crossorigin="anonymous"></script>
  <script defer src="./remote_dialer.js"></script>
</head>
<body>
  <main class="dialer-shell">
    <header class="topbar">
      <div>
        <div class="brand">CallPilot</div>
        <div class="line-label" data-i18n="remote_line">REMOTE LINE</div>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText" role="status" aria-live="polite"></span>
      </div>
    </header>

    <section class="call-surface" aria-labelledby="dialerTitle">
      <h1 id="dialerTitle" data-i18n="title">Call with your SIM</h1>
      <label for="dialNumber" data-i18n="number_label">Phone number</label>
      <input
        id="dialNumber"
        class="number-input"
        type="tel"
        inputmode="tel"
        autocomplete="tel"
        maxlength="32"
        placeholder="10000"
        aria-describedby="statusText">

      <div class="primary-actions">
        <button id="callButton" class="command call" type="button" data-i18n="call">Call</button>
        <button id="hangupButton" class="command hangup" type="button" data-i18n="hangup" disabled>Hang up</button>
      </div>

      <div class="keypad" id="keypad" aria-label="DTMF keypad">
        <button type="button" data-digit="1" disabled>1</button>
        <button type="button" data-digit="2" disabled>2</button>
        <button type="button" data-digit="3" disabled>3</button>
        <button type="button" data-digit="4" disabled>4</button>
        <button type="button" data-digit="5" disabled>5</button>
        <button type="button" data-digit="6" disabled>6</button>
        <button type="button" data-digit="7" disabled>7</button>
        <button type="button" data-digit="8" disabled>8</button>
        <button type="button" data-digit="9" disabled>9</button>
        <button type="button" data-digit="*" disabled>*</button>
        <button type="button" data-digit="0" disabled>0</button>
        <button type="button" data-digit="#" disabled>#</button>
      </div>

      <div class="connection-row" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>
  </main>
  <div id="audioHost" hidden></div>
</body>
</html>
