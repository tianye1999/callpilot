# CI：三平台 × Python 3.12 全量单测。
# Windows/Linux 腿保证的是「代码路径与测试可移植」；EC20 真机行为仍待硬件验证。
name: CI

on:
  push:
  pull_request:

# 同一 ref 的新提交取消进行中的旧跑，省 runner 排队时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ".[dev]" 必须带双引号：裸 .[dev] 在部分 shell 里会被当 glob 展开；
      # 双引号在 bash 与 pwsh（Windows 默认 shell）下行为一致。
      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Test
        run: pytest -q
