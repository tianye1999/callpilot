[project]
name = "agentcall"
version = "0.1.0"
description = "EC20 4G 模组 AI 电话助手：来电自动接听、AI 对话、短信与外呼"
requires-python = ">=3.12"
dependencies = [
    "pyserial>=3.5",
    "pyusb>=1.3.1",
    "sounddevice>=0.5.1",
    "numpy>=1.26.0",
    "python-dotenv>=1.0.0",
    "dashscope>=1.25.6",
    "websockets>=13.0",
    "aiohttp>=3.9.0",
    "pywebview>=5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"agentcall.web" = ["static/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
